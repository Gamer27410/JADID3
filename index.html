    id: "behbudi", name: "Mahmudxo'ja Behbudiy", years: "1875 – 1919", initials: "B",
    bio: `Mahmudxo'ja Behbudiy 1875-yilda Samarqand viloyatining Kattaqo'rg'on tumanida tug'ilgan. U diniy va dunyoviy ta'lim olgan. Otasi mahalliy qozi bo'lgan. Behbudiy yoshligidan arab, fors va rus tillarini o'rgangan. U bir necha marta Makkaga haj safarini amalga oshirgan. 1903-yilda Misr, Suriya va Turkiyaga sayohat qilib, u yerda jadidchilik g'oyalari bilan yaqindan tanishgan. Behbudiy Samarqandga qaytib, yangi usul maktablarini ochishga kirishgan. 1913-yilda "Oyina" jurnalini tashkil etgan. U o'zbek milliy teatrining asoschisi hisoblanadi. 1919-yilda Buxoro amiri tomonidan qatl etilgan.`,
    hayot: `Mahmudxo'ja Behbudiy O'rta Osiyo jadidchilik harakatining yetakchi namoyandalaridan biri bo'lib, uning faoliyati ta'lim, matbuot va adabiyot sohalarini qamrab olgan. Behbudiy 1911-yilda "Padarkush" nomli dramani yozgan — bu o'zbek milliy dramaturgiyasining ilk namunalaridan biri. Behbudiy yangi usul maktablari ochib, bolalarga zamonaviy ta'lim berish uchun kurashgan.`,

    bio: `Abdurauf Fitrat 1886-yilda Buxoroda tug'ilgan. U Buxorodagi an'anaviy madrasada ta'lim olgan, so'ngra Istanbulga borib o'qishni davom ettirgan. Turkiyada zamonaviy ta'lim va jadidchilik g'oyalari bilan tanishgan. 1909-yilda "Munozara" asarini yozgan. 1938-yilda siyosiy qatag'on qurboni bo'lib, otib tashlangan.`,

    id: "avloniy", name: "Abdulla Avloniy", years: "1878 – 1934", initials: "A",
    // ↓ Matnni o'zingiz kiriting
    bio: `1. Bolalik va Yoshlik Yillari
Abdulla Avloniy 1878-yil 12-iyulda Toshkentning Mergancha mahallasida kosib oilasida dunyoga kelgan.

Ta’limi: Dastlab eski maktabda, so‘ngra madrasada tahsil olgan. Biroq uning asosiy bilim manbai mustaqil mutolaa bo‘lgan. U arab, fors va tatar tillarini mukammal o‘rgangan, bu esa unga Sharq klassik adabiyoti va o‘sha davrdagi ilg‘or g‘oyalar bilan yaqindan tanishish imkonini bergan.

Mehnat faoliyati: Oilaviy sharoiti tufayli yoshligidan mehnatga aralashgan. U g‘isht quyuvchi, binokor bo‘lib ishlagan. Shuning uchun ham uni xalq orasida "Imoratchi usta" deb ham bilishgan.

2. Jadidchilik va Ma’rifatparvarlik
Avloniy O‘rta Osiyoda jadidchilik harakatining asoschilaridan biri hisoblanadi. U millatni uyg‘otishning yagona yo‘li — ilm va tarbiya ekanligini anglab yetgan.

Usuli jadid maktablari: 1904-yilda Toshkentning Mirobod mahallasida, keyinchalik esa boshqa joylarda yangi usuldagi maktablar ochgan.

Darsliklar yaratish: U yoshlar uchun zamonaviy darsliklar yozishga kirishgan. Uning "Birinchi muallim", "Ikkinchi muallim", "Turkiy Guliston yoxud axloq" asarlari o‘sha davr ta’lim tizimida inqilob yasagan. Ayniqsa, "Turkiy Guliston yoxud axloq" asari bugungi kunda ham o‘zbek pedagogikasining oltin merosi hisoblanadi.

3. Adabiy va Dramatik Faoliyat
Avloniy o‘z ijodini millatning dardini kuylashga va uni isloh qilishga qaratgan.

She’riyati: U "Hijron" taxallusi bilan she’rlar yozgan. Uning she’rlarida milliy ozodlik, ilmga chorlov va jaholatga qarshi nafrat yaqqol sezilib turadi.

Teatr: Avloniy o‘zbek teatri asoschilaridan biridir. U 1913-yilda "Turon" truppasini tashkil etgan.

Dramaturgiya: "Advokatlik osonmi?", "Pinak", "Biz va siz", "Portugaliya inqilobi" kabi dramalari orqali jamiyatdagi illatlarni hajviy va tanqidiy ruhda ko‘rsatib bergan.

4. Jurnalistika va Ijtimoiy-siyosiy Hayot
U matbuotni "millatning ko‘zgusi" deb bilgan va o‘zbek jurnalistikasi rivojiga ulkan hissa qo‘shgan.

Nashrlar: "Shuhrat" (1907), "Osiyo" (1908), "Turan" (1917) kabi gazetalarni tashkil qilgan va ularda muharrirlik qilgan.

Diplomatiya: 1920-yillarda Afg‘onistonda diplomatik missiya tarkibida xizmat qilgan (Sovet Ittifoqining Afg‘onistondagi konsuli bo‘lgan).

5. Mashhur Iqtiboslari
Avloniyning qarashlarini quyidagi mashhur jumlasi orqali tushunish mumkin:

"Tarbiya biz uchun yo hayot — yo mamot, yo najot — yo halokat, yo saodat — yo falokat masalasidir."

6. Umrining Oxiri va Merosi
Abdulla Avloniy hayotining so‘nggi yillarida O‘rta Osiyo davlat universitetida (hozirgi O‘zMU) dars bergan, professor unvoniga ega bo‘lgan. U 1934-yil 25-avgustda Toshkentda vafot etgan.

Bugungi kunda uning nomi Toshkentdagi markaziy ko‘chalardan biriga, xalq ta’limi xodimlarini qayta tayyorlash institutiga berilgan. Uning asarlari maktab darsliklarining ajralmas qismiga aylangan.`,
    hayot: `Abdulla Avloniy — o‘zbek ma’rifatparvarlik adabiyotining yirik vakili, iste’dodli shoir, dramaturg, jurnalist va zamonaviy pedagogika asoschilaridan biri. Uning hayoti va ijodi o‘zbek xalqining ma’naviy uyg‘onish davri bilan chambarchas bog‘liq.
​1. Hayot yo‘li
​Abdulla Avloniy 1878-yil 12-iyulda Toshkentning Mergancha mahallasida tug‘ilgan. Uning bolaligi va yoshligi oson kechmagan:
​Ta’limi: Dastlab eski maktabda, so‘ngra madrasada o‘qidi. Biroq u faqat diniy bilimlar bilan cheklanib qolmay, mustaqil ravishda rus tili va dunyoviy fanlarni o‘rgandi.
​Kasbi: O‘z xarajatlarini qoplash uchun yoshligidan binokorlik va ganchkorlik bilan shug‘ullangan, xalq orasida u "Imoratchi usta" sifatida ham tanilgan.
​Jamoat ishlari: 1917-yilgi inqilobdan keyin u turli davlat lavozimlarida ishladi, Afg‘onistonda diplomatik missiyalarda qatnashdi va umrining oxirigacha O‘rta Osiyo davlat universitetida (hozirgi O‘zMU) dars berdi.
​2. Pedagogik faoliyati: "Yangi usul" maktablari
​Avloniy millatni uyg‘otishning yagona yo‘li — ta’limda deb bildi. 1904-yilda u Toshkentning Mirobod mahallasida jadid maktabini ochdi.
​Darsliklar yaratishi: U yangi maktablar uchun zamonaviy darsliklar yozdi. Ularning ichida eng mashhurlari:
​“Birinchi muallim”
​“Ikkinchi muallim”
​“Turkiy Guliston yoxud axloq” (Bu asar hozir ham axloqshunoslikning eng sara namunasi hisoblanadi).
​Xayriya: U kambag‘al bolalarni o‘qitish uchun "Jamiyati xayriya" tashkilotini tuzishda jonbozlik ko‘rsatgan.
​3. Adabiy va badiiy ijodi
​Avloniy ijodi rang-barang: u ham shoir, ham dramaturg, ham publitsist edi.
​She’riyati
​U "Hijron" taxallusi bilan she’rlar yozgan. Uning she’rlarida millat qayg‘usi, ilmga chorlov va hurlik g‘oyalari ustuvor:
​"Adabiyot — har bir millatning ko‘zgusidir" — degan edi u.
​Dramaturgiyasi
​O‘zbek teatr san’atining shakllanishida Avloniyning o‘rni beqiyos. U 1913-yilda "Turon" teatr truppasini tashkil etgan. Uning qalamiga mansub sahna asarlari:
​“Advokatlik osonmi?” (Komediyasi orqali ijtimoiy illatlarni fosh qilgan)
​“Pinak”
​“Biz va siz”
​Jurnalistika
​U o‘zbek matbuotining "otaxonlaridan" biri. "Shuhrat" (1907), "Osiyo" kabi gazetalarni tashkil qilgan va ularda o‘tkir publitsistik maqolalari bilan xalqni fikrlashga chorlagan.
​4. "Turkiy Guliston yoxud axloq" asari
​Bu asar Avloniy ijodining cho‘qqisi hisoblanadi. Unda muallif insoniy fazilatlarni ikki guruhga bo‘lib tushuntiradi:
​Yaxshi xulqlar: Sabr, intizom, adolat, iffat, shijoat va boshqalar.
​Yomon xulqlar: G‘azab, jaholat, kibr, hasad.
​U axloqni shunchaki nazariya emas, balki jamiyatni o‘zgartiruvchi kuch deb bildi. Uning mashhur jumlasi bor:
​"Tarbiya biz uchun yo hayot — yo mamot, yo najot — yo halokat, yo saodat — yo falokat masalasidir."
​5. Xotira va e’tirof
​Abdulla Avloniy 1934-yil 25-avgustda Toshkentda vafot etgan. Mustaqillik yillarida uning nomi munosib e’zozlandi:
​"Buyuk xizmatlari uchun" ordeni bilan taqdirlangan (vafotidan so‘ng).
​Ko‘plab ko‘chalar, maktablar va pedagogika institutlariga uning nomi berilgan.
​Abdulla Avloniyning hayoti — o‘z xalqi va vatanining ma’rifati yo‘lida fido qilingan umr namunasidir.`,
    asar: `1. Pedagogik Merosi: "Insoniyatning Komillik Dasturi"
Avloniyning darsliklari shunchaki o‘quv qo‘llanma emas, balki yangi dunyoqarashni shakllantirish vositasi bo‘lgan.

"Turkiy Guliston yoxud axloq": Bu asar 20-asr boshidagi o‘zbek pedagogikasining eng yuksak cho‘qqisidir. Avloniy unda inson xulqini ilmiy va falsafiy asoslab beradi. Uning fikricha, axloq tug‘ma emas, balki tarbiya natijasidir. Asarda "Haqgo‘ylik", "Vatanparvarlik", "Ilm-ma’rifat" kabi tushunchalar milliy ruh bilan sug‘orilgan holda tushuntiriladi. Masalan, u Vatanni sevishni iymonning bir qismi deb ta’riflaydi va buni amaliy ishlar bilan isbotlash kerakligini uqtiradi.

"Birinchi muallim" va "Ikkinchi muallim": Bu darsliklar orqali Avloniy savod chiqarishning oson va qiziqarli usulini joriy qildi. U eski maktablardagi "abjad" usulidan voz kechib, tovush tizimiga asoslangan ta’limni yo‘lga qo‘ydi. Bu kitoblar o‘z davrida o‘nlab marta qayta nashr etilgani ularning naqadar zarur bo‘lganini ko‘rsatadi.

2. Dramaturgiya: Teatr orqali "Uyg'onish"
Avloniy dramaturgiyasi jamiyatdagi og‘riqli nuqtalarni ochiq-oydin ko‘rsatib bergan. Uning pyesalari tili xalqona, kinoya va kesatiqlarga boy.

"Advokatlik osonmi?": Bu pyesada muallif shunchaki kulgi uchun yozmagan. U ilm-ma’rifatsiz, tili boshqa-yu, dili boshqa bo‘lgan "soxta ziyolilar"ning qiyofasini ochib tashlagan. Asar orqali u xalqni o‘z huquqini bilishga va aldov qurboni bo‘lmaslikka chaqiradi.

"Pinak" va "Biz va Siz": Bu asarlarida u millatning ichki illatlari — ko‘r-ko‘rona an’analarga yopishib olish, yangilikdan qo‘rqish va maishiy buzuqliklarni ayovsiz tanqid qilgan. U sahnani xalq uchun oyna deb bilgan va bu oynada xalq o‘zining nuqsonlarini ko‘rib, ulardan qutulishi kerakligini maqsad qilgan.

3. "Hijron" She’riyati: Milliy Iztirob va Umid
Avloniyning she’riy merosi uning "Adabiyot yoxud milliy she’rlar" to‘plamida jamlangan. Uning poeziyasi klassik g‘azalchilik an’analarini zamonaviy ijtimoiy g‘oyalar bilan birlashtirgan.

Mavzu ko‘lami: Uning she’rlarida Vatan — muqaddas maskan, millat esa — o‘z yo‘lini yo‘qotgan, lekin uyg‘onishga qodir ulkan kuch sifatida tasvirlangan.

4. Matbuot va Maqolanavislik
Avloniy o‘zbek matbuoti tarixida o‘chmas iz qoldirgan. U o‘zining publitsistik maqolalarida quyidagi masalalarni ko‘targan:

Maktab islohoti: Maktablarni zamonaviy asbob-uskunalar bilan jihozlash va o‘qituvchilarning saviyasini oshirish.

Iqtisodiy mustaqillik: Millatning o‘z sanoati va savdo tizimiga ega bo‘lishi zarurligi.

Xotin-qizlar ozodligi: Ayollarning bilimli bo‘lishi jamiyatning yarmidan ko‘pi ma’rifatli bo‘lishini anglatishini u birinchilardan bo‘lib ta’kidlagan.

// ================================================================
// HOLAT
// ================================================================
let selectedJadid = null;
let currentType   = null;
let navHistory    = ['jadidlar-page'];

// ================================================================
// SAHIFALAR
// ================================================================
function showPage(pageId) {
  ['jadidlar-page','jadid-menu-page','content-page'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('active');
    el.style.display = 'none';
  });
  const target = document.getElementById(pageId);
  target.classList.add('active');
  target.style.display = 'block';
  window.scrollTo(0, 0);

  const backBtn   = document.getElementById('back-btn');
  const headerSub = document.getElementById('header-sub');
  if (pageId === 'jadidlar-page') {
    backBtn.style.display = 'none';
    headerSub.textContent = 'Jadidni tanlang';
  } else {
    backBtn.style.display = 'flex';
    headerSub.textContent = selectedJadid ? selectedJadid.name : '';
  }
}

function goBack() {
  stopAudio();
  navHistory.pop();
  showPage(navHistory[navHistory.length - 1]);
}

// ================================================================
// RO'YXAT
// ================================================================
function renderJadidlar(list) {
  const container = document.getElementById('jadidlar-list');
  container.innerHTML = '';
  list.forEach(jadid => {
    const card = document.createElement('div');
    card.className = 'jadid-card';
    card.innerHTML = `
      <div class="jadid-avatar">${jadid.initials}</div>
      <div class="jadid-info">
        <h3>${jadid.name}</h3>
        <p>${jadid.years}</p>
      </div>
      <span class="arrow">›</span>`;
    card.onclick = () => selectJadid(jadid);
    container.appendChild(card);
  });
}

function filterJadidlar(q) {
  renderJadidlar(jadidlar.filter(j => j.name.toLowerCase().includes(q.toLowerCase())));
}

// ================================================================
// JADID TANLASH
// ================================================================
function selectJadid(jadid) {
  selectedJadid = jadid;
  document.getElementById('hero-avatar').textContent = jadid.initials;
  document.getElementById('hero-name').textContent   = jadid.name;
  document.getElementById('hero-years').textContent  = jadid.years;
  navHistory.push('jadid-menu-page');
  showPage('jadid-menu-page');
}

// ================================================================
// KONTENT
// ================================================================
function showContent(type) {
  currentType = type;
  stopAudio();

  const titles = {
    bio:   '📖 ' + selectedJadid.name + ' — Avtobiografiya',
    hayot: '🌟 ' + selectedJadid.name + ' — Hayoti va ijodi',
    asar:  '📝 ' + selectedJadid.name + ' — Asarlari'
  };

  document.getElementById('content-title').textContent = titles[type];
  document.getElementById('content-text').textContent  = selectedJadid[type] || '(matn kiritilmagan)';

  const audioUrl = selectedJadid.audio && selectedJadid.audio[type];
  const player   = document.getElementById('audio-player');
  const noAudio  = document.getElementById('no-audio-msg');

  if (audioUrl) {
    player.src = audioUrl;
    player.load();
    player.style.display = 'block';
    noAudio.style.display = 'none';
  } else {
    player.src = '';
    player.style.display = 'none';
    noAudio.style.display = 'block';
  }

  navHistory.push('content-page');
  showPage('content-page');
}

function stopAudio() {
  const player = document.getElementById('audio-player');
  if (player) { player.pause(); player.currentTime = 0; }
}

// ================================================================
// TELEGRAM
// ================================================================
if (window.Telegram && window.Telegram.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}

document.addEventListener('DOMContentLoaded', function() {
  const fp = document.getElementById('jadidlar-page');
  fp.style.display = 'block';
  fp.classList.add('active');
  renderJadidlar(jadidlar);
});
</script>
