  {
    id: "behbudi", name: "Mahmudxo'ja Behbudiy", years: "1875 – 1919", initials: "B",
    bio: `1. Tug‘ilishi va Kelib Chiqishi
Mahmudxo'ja Behbudiy 1875-yil 19-yanvarda Samarqand yaqinidagi Baxshitepa qishlog‘ida, ruhoniy oilasida dunyoga kelgan. Uning otasi Ismoilxo‘ja islom huquqi bo‘yicha yirik mutaxassis bo‘lib, o‘g‘lining bilimli bo‘lishiga katta e’tibor bergan. Behbudiy yoshligidanoq o‘tkir zehnli bo‘lib, o‘z davrining diniy va dunyoviy ilmlarini puxta egallagan.

2. Sayohatlar va Dunyoqarashning Shakllanishi
Behbudiyning dunyoqarashi uning sayohatlari davomida tubdan o‘zgardi. U haj safari va boshqa maqsadlar bilan quyidagi shaharlarda bo‘ldi:

Makka va Madina

Misr (Qohira)

Turkiya (Istanbul)

Rossiya (Peterburg, Moskva, Qozon)

Ushbu sayohatlar davomida u musulmon dunyosining qoloqligini va Yevropa taraqqiyotini solishtirib, yagona najot ma'rifat va ta'limda ekanligini tushunib yetdi.

3. "Padarkush" — Millat Uyg‘onishi Uchun Bong
1911-yilda Behbudiy o‘zining mashhur "Padarkush" dramasini yozdi. Bu asar o‘zbek dramaturgiyasining birinchi namunasi hisoblanadi.

Asosiy g‘oyasi: O‘qimagan farzandning o‘z otasining qotiliga aylanishi orqali ilmsizlikning dahshatli oqibatlarini ko‘rsatib berish.

Ta'siri: Ushbu drama butun Turkistonda katta shov-shuvga sabab bo‘ldi va odamlarni farzandlarini maktabga berishga chorladi.

4. Matbuot va Nashriyot Faoliyati
Behbudiy o‘zining "Behbudiya" nashriyotiga asos soldi. U orqali millatni uyg‘otuvchi gazeta va jurnallarni chop etdi:

"Samarqand" gazetasi (1913-yil)

"Oyna" jurnali (1913–1915-yillar) — Bu jurnal jadidchilikning eng nufuzli nashrlaridan biri bo‘lib, unda ilm, til, tarix va madaniyat masalalari ko‘tarilgan.

5. Ta'lim Islohotchisi
Behbudiy "Usuli jadid" (yangi usul) maktablari uchun bir qator darsliklar yaratdi:

“Muntahabi jug‘rofiyai umumiy” (Geografiya)

“Kitobat ul-atfol” (Xat savodi)

“Amaliyoti islom”

Uning eng mashhur shiori :

"Dunyo imoratlari ichida eng ulug‘i maktabdir."

6. Fojiali Yakun
1919-yilda Behbudiy safarga chiqqanida Qarshi shahrida Buxoro amirligi amaldorlari tomonidan qo‘lga olinadi va qiynoqlar bilan qatl etiladi. Uning vafoti butun turk dunyosi uchun katta yo‘qotish bo‘ldi. Sadriddin Ayniy uning vafotiga bag‘ishlab marsiyalar yozgan.`,
    hayot: `Mahmudxo‘ja Behbudiy (1875–1919) — turkiston jadidchilik harakatining asoschisi, buyuk ma’rifatparvar, dramaturg, publitsist va jamoat arbobi.

Hayot yo‘li
Tug‘ilishi: 1875-yil 19-yanvarda Samarqand shahrida muftiylar oilasida dunyoga kelgan.

Ta’limi: Dastlab madrasada tahsil olgan, so‘ngra o‘z ustida ishlab, arab, fors va rus tillarini mukammal egallagan. Islom huquqi bo‘yicha "muftiy" darajasiga ko‘tarilgan.

Sayohatlari: 1900-yillardan boshlab Misr, Turkiya, Rossiya va Arabiston bo‘ylab sayohat qilgan. Bu safarlar uning dunyoqarashini o‘zgartirib, Turkistonda ta’lim islohotini o‘tkazish g‘oyasini shakllantirgan.

Siyosiy faoliyati: 1917-yilgi inqilobiy jarayonlarda faol qatnashgan. "Sho‘roi islomiya" tashkilotiga rahbarlik qilgan va Turkiston muxtoriyati g‘oyasini qo‘llab-quvvatlagan.

Vafoti: 1919-yil bahorida safar chog‘ida Qarshi shahrida Buxoro amirligi amaldorlari tomonidan qo‘lga olingan va qatl etilgan.

Ijodiy va ma’rifiy faoliyati
Teatr: 1911-yilda o‘zbek dramaturgiyasining birinchi namunasi bo‘lgan "Padarkush" dramasini yozgan. Asar savodsizlikning fojiali oqibatlari haqida bo‘lib, 1913-yilda Samarqandda sahnalashtirilgan.

Matbuot: * 1913-yilda "Samarqand" gazetasini nashr etgan.

1913–1915-yillarda jadidlarning bosh nashri bo‘lgan "Oyna" jurnalini chiqargan.

Darsliklar: Yangi usul maktablari (Usuli jadid) uchun 10 dan ortiq darslik yozgan:

“Muntahabi jug‘rofiyai umumiy” (Geografiya)

“Kitobat ul-atfol” (Xat savodi)

“Amaliyoti islom”

“Muxtasari tarixi islom”

Maqolalari: Uning 300 dan ortiq maqolalari mavjud bo‘lib, ularda "ikki emas, to‘rt tilni bilish lozimligi", ayollar ma’rifati va milliy birlik masalalari ko‘tarilgan.

Asosiy g‘oyalari
"Haq olinur, berilmas!" — milliy ozodlik va huquqiy mustaqillik shiori.

"Dunyo imoratlari ichida eng ulug‘i maktabdir" — jamiyatni faqat bilim orqali o‘zgartirish mumkinligi haqidagi qarashi.

Til siyosati: Turkiston ahlining o‘z ona tili bilan birga rus va yevropa tillarini o‘rganishi tarafdori bo‘lgan.`,
    asar: `
Mahmudxo‘ja Behbudiy o‘zbek ma’rifatparvarlik harakatining asoschisi va jadidchilikning nazariyotchisi sifatida boy adabiy, publitsistik va ilmiy meros qoldirgan. Uning ijodiy faoliyatidagi eng muhim asari 1911-yilda yozilgan va 1913-yilda sahnalashtirilgan "Padarkush" dramasi bo‘lib, bu asar o‘zbek dramaturgiyasining tamal toshini qo‘ygan hamda o‘sha davrdagi jaholat, ilmsizlik va ma’naviy qashshoqlikni keskin tanqid ostiga olgan. Behbudiy faqat badiiy ijod bilan cheklanib qolmay, xalqning savodxonligini oshirish maqsadida darsliklar ham yaratgan; xususan, "Muntaxabi jug‘rofiyai umumiy" (Umumiy geografiya saylanmasi), "Kitobat ul-atfol" (Bolalar xati), "Amoliyoti islom" va "Muxtasari tarixi islom" kabi asarlari maktablarda asosiy qo'llanma bo'lib xizmat qilgan. Adibning publitsistik faoliyati ham g‘oyatda sermahsul bo‘lib, u "Oyna" jurnali va "Samarqand" gazetasidagi yuzlab maqolalarida til masalasi, millat istiqboli, turkiy xalqlarning birligi hamda dunyoviy ilmlarni egallash zaruratini targ‘ib qilgan. Shuningdek, uning sayohat xotiralari jamlangan "Qasdi safar" asari ham ma’rifiy ahamiyatga ega bo‘lib, unda musulmon olami va Yevropa taraqqiyoti qiyosiy tahlil etilgan. Behbudiy o'z asarlarida "Ikki emas, to'rt til lozim" g'oyasini ilgari surib, millatni dunyo miqyosiga olib chiqishni asosiy maqsad qilib qo'ygan.`,
    audio: { bio: BASE_URL + "/behbudiy_bio.MP3", 
            hayot: BASE_URL + "/behbudiy_hayot.MP3", 
            asar: BASE_URL + "/behbudiy_asar.MP3"
    }
  },

  // 2. FITRAT
  {
    id: "fitrat", name: "Abdurauf Fitrat", years: "1886 – 1938", initials: "F",
    bio: `Istanbul shahriga borib, 1909–1913-yillarda dorilfununda tahsil ko‘rdi.

Turkiyadagi muhit uning dunyoqarashini tubdan o‘zgartirdi. U yerda "Buxoro ta’limi maorif jamiyati"ni tuzib, jadidchilik harakatining faol namoyandalaridan biriga aylandi. Vatanga qaytgach, xalqni jaholatdan qutqarish, ta’limni isloh qilish va milliy mustaqillik g‘oyalarini targ‘ib qila boshladi.

Fitrat serqirra ijodkor edi. U ham adib, ham olim, ham davlat arbobi sifatida tanildi. Uning "Munozara", "Bayonoti sayyohi hindi" kabi asarlari jamiyatdagi illatlarni fosh etishga qaratilgan edi. Shuningdek, u o‘zbek tili grammatikasi, adabiyotshunoslik va musiqashunoslikka doir muhim ilmiy tadqiqotlar yaratdi. 1920-yillarda Buxoro Xalq Sovet Respublikasida maorif noziri va boshqa mas’ul lavozimlarda faoliyat yuritdi.`,
    hayot: `Abdurauf Fitrat 1886-yilda Buxoroda tug‘ildi. Uning hayoti va ijodi o‘zbek ma’rifatparvarlik harakati hamda jadidchilikning eng yorqin sahifalaridan birini tashkil etadi.

Fitrat Istanbul dorilfununida o‘qib qaytgach, adabiyot, tilshunoslik, tarix va san’at sohalarida sermahsul ijod qildi. Uning "Munozara" va "Bayonoti sayyohi hindi" asarlari Turkiston xalqi uyg‘onishida muhim turtki bo‘ldi. Adib "Abulfayzxon" tragediyasi orqali davlatchilik va adolat masalalarini ko‘tardi. "Qiyomat" hikoyasi va "Shaytanat" kabi asarlarida esa ijtimoiy illatlarni o‘tkir hajviya ostiga oldi.

U adabiyotshunos olim sifatida "O‘zbek adabiyoti namunalari" tazkirasini tuzdi, "Aruz haqida" ilmiy asarini yozdi. Tilshunoslik sohasida "Sarf" va "Nahv" darsliklarini yaratib, o‘zbek tili grammatikasini tizimga soldi. Musiqashunos sifatida "Shashmaqom" tarixiga oid tadqiqotlar o‘tkazdi.`,
    asar: `Abdurauf Fitrat ijodi o‘zbek adabiyoti va ilm-fani rivojiga ulkan hissa qo‘shgan boy merosdan iborat. Uning asarlari mavzu ko‘lami va janrlariga ko‘ra bir necha yo‘nalishga bo‘linadi.

Badiiy nasrda "Munozara", "Bayonoti sayyohi hindi" va "Rahbari najot" asarlari mashhur bo‘lib, ularda jamiyat taraqqiyotiga to‘siq bo‘layotgan illatlar va jaholat tanqid qilinadi. "Qiyomat" xayoliy hikoyasi hamda "Oq mozor", "Zayd va Zaynub" kabi asarlari o‘zbek nasrida o‘ziga xos o‘ringa ega.

Dramaturgiya sohasida Fitrat "Abulfayzxon" tragediyasi bilan o‘zbek adabiyotida tarixiy drama janrini yangi bosqichga ko‘tardi. Shuningdek, uning "Chin sevish", "Hind ixtilolchilari", "Sinfiy kurash" va "Arslon" kabi pyesalari sahnaga qo‘yilgan.

Ilmiy merosi juda salmoqli bo‘lib, tilshunoslikda "Sarf" va "Nahv" darsliklari, adabiyotshunoslikda "Aruz haqida", "Eski o‘zbek adabiyoti namunalari", "Adabiyot qoidalari" kabi fundamental tadqiqotlari yaratilgan. Musiqashunoslik yo‘nalishida "O‘zbek klassik musiqasi va uning tarixi" asari katta ahamiyatga ega.

Bundan tashqari, Fitrat o‘zining publitsistik maqolalari va "Yana yong‘in", "Mirrix yulduziga", "Shoir" kabi she’riy asarlari bilan milliy uyg‘onish g‘oyalarini ilgari surgan. Uning asarlari o‘zbek tili, tarixi va madaniyatini o‘rganishda hanuzgacha asosiy manbalardan biri bo‘lib xizmat qilmoqda.`,
    audio: { bio: BASE_URL + "/fitrat_bio.MP3", 
            hayot: BASE_URL + "/fitrat_hayot.MP3", 
            asar: BASE_URL + "/fitrat_asar.MP3"
    }
  },

  // 3. CHO'LPON
  {
    id: "cholpon", name: "Abdulhamid Cho'lpon", years: "1897 – 1938", initials: "CH",
    bio: `Abdulhamid Sulaymon o‘g‘li Cho‘lpon 1897-yilda Andijon shahrida tug‘ildi. Dastlabki ta’limni eski maktabda, so‘ngra madrasada oldi. Rus-tuzem maktabida tahsil ko‘rib, rus tili va adabiyoti bilan yaqindan tanishdi, sharq va g‘arb madaniyatini chuqur o‘rgandi.

Uning ijodiy faoliyati 1913-1914-yillardan boshlanib, "Qalandar", "Mirzaqalandar", "Andijonlik" kabi taxalluslar bilan matbuotda chiqishlar qildi. "Uyg‘onish", "Buloqlar", "Tong sirlari" kabi she’riy to‘plamlari bilan o‘zbek she’riyatiga yangi ruh va zamonaviy vaznlar olib kirdi. Adibning "Kecha va kunduz" romani o‘zbek nasrining yetuk namunalaridan biri hisoblanadi.

Cho‘lpon mohir tarjimon sifatida ham tanildi. U jahon adabiyoti durdonalarini, jumladan, Shekspirning "Hamlet", Pushkinning "Boris Godunov" va "Dubrovskiy" asarlarini o‘zbek tiliga yuksak mahorat bilan o‘girdi. Dramaturg sifatida "Yorqinoy", "Mushtumzo‘r", "O‘rtoq Qarshiboev" kabi pyesalarni yozib, milliy teatr rivojiga hissa qo‘shdi.

Uning hurlik va erkinlikni tarannum etuvchi asarlari sho‘ro hukumati tomonidan keskin tanqidga uchradi. Cho‘lpon bir necha bor ta’qib qilindi va qamoqqa olindi. 1938-yil 4-oktabrda Toshkentda qatl etildi. Adibning nomi va ijodi O‘zbekiston mustaqillikka erishgandan so‘ng rasman oqlanib, munosib e’tirof etildi.`,
    hayot: `Abdulhamid Cho'lpon o'zbek she'riyati va nasrining yirik vakili sifatida tarixga kirgan. "Kecha va kunduz" romani o'zbek romanchiligining rivojlanishida muhim bosqich bo'ldi. Cho'lpon Shekspir, Pushkin kabi jahon adabiyoti klassiklarini o'zbek tiliga tarjima qilgan.`,
    asar: `Cho'lponning asosiy asarlari:\n\n• "Kecha va kunduz" (roman)\n• "Bahor" (she'riy to'plam)\n• Ko'plab she'rlar va tarjimalar`,

    hayot: `Abdulla Qodiriy — o'zbek romanchiligining otasi sifatida e'tirof etilgan buyuk adib. "O'tkan kunlar" — o'zbek tilidagi ilk tarixiy roman. Julqunboy taxallusi ostida yozilgan hajviy asarlari mashhur bo'lgan.`,
    asar: `Qodiriyning asosiy asarlari:\n\n• "O'tkan kunlar" (1926)\n• "Mehrobdan chayon" (1929)\n• "Obid ketmon" (hikoya)\n• Julqunboy taxallusi bilan hajviy asarlar`,

  // ================================================================

  // GitHub da audio/ papkasiga quyidagi fayllarni yuklang:

  {
    id: "avloniy", name: "Abdulla Avloniy", years: "1878 – 1934", initials: "A",
    // ↓ Matnni o'zingiz kiriting
    bio: `1. Bolalik va Yoshlik Yillari
Abdulla Avloniy 1878-yil 12-iyulda Toshkentning Mergancha mahallasida kosib oilasida dunyoga kelgan.

Ta’limi: Dastlab eski maktabda, so‘ngra madrasada tahsil olgan. Biroq uning asosiy bilim manbai mustaqil mutolaa bo‘lgan. U arab, fors va tatar tillarini mukammal o‘rgangan, bu esa unga Sharq klassik adabiyoti va o‘sha davrdagi ilg‘or g‘oyalar bilan yaqindan tanishish imkonini bergan.

Mehnat faoliyati: Oilaviy sharoiti tufayli yoshligidan mehnatga aralashgan. U g‘isht quyuvchi, binokor bo‘lib ishlagan. Shuning uchun ham uni xalq orasida "Imoratchi usta" deb ham bilishgan.

2. Jadidchilik va Ma’rifatparvarlik
Avloniy O‘rta Osiyoda jadidchilik harakatining asoschilaridan biri hisoblanadi. U millatni uyg‘otishning yagona yo‘li — ilm va tarbiya ekanligini anglab yetgan.

Usuli jadid maktablari: 1904-yilda Toshkentning Mirobod mahallasida, keyinchalik esa boshqa joylarda yangi usuldagi maktablar ochgan.

Darsliklar yaratish: U yoshlar uchun zamonaviy darsliklar yozishga kirishgan. Uning "Birinchi muallim", "Ikkinchi muallim", "Turkiy Guliston yoxud axloq" asarlari o‘sha davr ta’lim tizimida inqilob yasagan. Ayniqsa, "Turkiy Guliston yoxud axloq" asari bugungi kunda ham o‘zbek pedagogikasining oltin merosi hisoblanadi.

3. Adabiy va Dramatik Faoliyat
Avloniy o‘z ijodini millatning dardini kuylashga va uni isloh qilishga qaratgan.

She’riyati: U "Hijron" taxallusi bilan she’rlar yozgan. Uning she’rlarida milliy ozodlik, ilmga chorlov va jaholatga qarshi nafrat yaqqol sezilib turadi.

Teatr: Avloniy o‘zbek teatri asoschilaridan biridir. U 1913-yilda "Turon" truppasini tashkil etgan.

Dramaturgiya: "Advokatlik osonmi?", "Pinak", "Biz va siz", "Portugaliya inqilobi" kabi dramalari orqali jamiyatdagi illatlarni hajviy va tanqidiy ruhda ko‘rsatib bergan.

4. Jurnalistika va Ijtimoiy-siyosiy Hayot
U matbuotni "millatning ko‘zgusi" deb bilgan va o‘zbek jurnalistikasi rivojiga ulkan hissa qo‘shgan.

Nashrlar: "Shuhrat" (1907), "Osiyo" (1908), "Turan" (1917) kabi gazetalarni tashkil qilgan va ularda muharrirlik qilgan.

Diplomatiya: 1920-yillarda Afg‘onistonda diplomatik missiya tarkibida xizmat qilgan (Sovet Ittifoqining Afg‘onistondagi konsuli bo‘lgan).

5. Mashhur Iqtiboslari
Avloniyning qarashlarini quyidagi mashhur jumlasi orqali tushunish mumkin:

"Tarbiya biz uchun yo hayot — yo mamot, yo najot — yo halokat, yo saodat — yo falokat masalasidir."

6. Umrining Oxiri va Merosi
Abdulla Avloniy hayotining so‘nggi yillarida O‘rta Osiyo davlat universitetida (hozirgi O‘zMU) dars bergan, professor unvoniga ega bo‘lgan. U 1934-yil 25-avgustda Toshkentda vafot etgan.

Bugungi kunda uning nomi Toshkentdagi markaziy ko‘chalardan biriga, xalq ta’limi xodimlarini qayta tayyorlash institutiga berilgan. Uning asarlari maktab darsliklarining ajralmas qismiga aylangan.`,
    hayot: `Abdulla Avloniy — o‘zbek ma’rifatparvarlik adabiyotining yirik vakili, iste’dodli shoir, dramaturg, jurnalist va zamonaviy pedagogika asoschilaridan biri. Uning hayoti va ijodi o‘zbek xalqining ma’naviy uyg‘onish davri bilan chambarchas bog‘liq.

​Kasbi: O‘z xarajatlarini qoplash uchun yoshligidan binokorlik va ganchkorlik bilan shug‘ullangan, xalq orasida u "Imoratchi usta" sifatida ham tanilgan.
​Jamoat ishlari: 1917-yilgi inqilobdan keyin u turli davlat lavozimlarida ishladi, Afg‘onistonda diplomatik missiyalarda qatnashdi va umrining oxirigacha O‘rta Osiyo davlat universitetida (hozirgi O‘zMU) dars berdi.

​Abdulla Avloniyning hayoti — o‘z xalqi va vatanining ma’rifati yo‘lida fido qilingan umr namunasidir.`,
    asar: `1. Pedagogik Merosi: "Insoniyatning Komillik Dasturi"
Avloniyning darsliklari shunchaki o‘quv qo‘llanma emas, balki yangi dunyoqarashni shakllantirish vositasi bo‘lgan.

"Turkiy Guliston yoxud axloq": Bu asar 20-asr boshidagi o‘zbek pedagogikasining eng yuksak cho‘qqisidir. Avloniy unda inson xulqini ilmiy va falsafiy asoslab beradi. Uning fikricha, axloq tug‘ma emas, balki tarbiya natijasidir. Asarda "Haqgo‘ylik", "Vatanparvarlik", "Ilm-ma’rifat" kabi tushunchalar milliy ruh bilan sug‘orilgan holda tushuntiriladi. Masalan, u Vatanni sevishni iymonning bir qismi deb ta’riflaydi va buni amaliy ishlar bilan isbotlash kerakligini uqtiradi.

2. Dramaturgiya: Teatr orqali "Uyg'onish"
Avloniy dramaturgiyasi jamiyatdagi og‘riqli nuqtalarni ochiq-oydin ko‘rsatib bergan. Uning pyesalari tili xalqona, kinoya va kesatiqlarga boy.

"Advokatlik osonmi?": Bu pyesada muallif shunchaki kulgi uchun yozmagan. U ilm-ma’rifatsiz, tili boshqa-yu, dili boshqa bo‘lgan "soxta ziyolilar"ning qiyofasini ochib tashlagan. Asar orqali u xalqni o‘z huquqini bilishga va aldov qurboni bo‘lmaslikka chaqiradi.

"Pinak" va "Biz va Siz": Bu asarlarida u millatning ichki illatlari — ko‘r-ko‘rona an’analarga yopishib olish, yangilikdan qo‘rqish va maishiy buzuqliklarni ayovsiz tanqid qilgan. U sahnani xalq uchun oyna deb bilgan va bu oynada xalq o‘zining nuqsonlarini ko‘rib, ulardan qutulishi kerakligini maqsad qilgan.

3. "Hijron" She’riyati: Milliy Iztirob va Umid
Avloniyning she’riy merosi uning "Adabiyot yoxud milliy she’rlar" to‘plamida jamlangan. Uning poeziyasi klassik g‘azalchilik an’analarini zamonaviy ijtimoiy g‘oyalar bilan birlashtirgan.

Ma’rifatga chorlov: U yoshlarni Yevropa va dunyo tillarini o‘rganishga, texnika va fan sirlarini egallashga chaqiradi. Uning "Ilm o‘qung" kabi misralari o‘sha davr yoshlari uchun shior bo‘lib xizmat qilgan.

4. Matbuot va Maqolanavislik
Avloniy o‘zbek matbuoti tarixida o‘chmas iz qoldirgan. U o‘zining publitsistik maqolalarida quyidagi masalalarni ko‘targan:

Maktab islohoti: Maktablarni zamonaviy asbob-uskunalar bilan jihozlash va o‘qituvchilarning saviyasini oshirish.

Iqtisodiy mustaqillik: Millatning o‘z sanoati va savdo tizimiga ega bo‘lishi zarurligi.

Xotin-qizlar ozodligi: Ayollarning bilimli bo‘lishi jamiyatning yarmidan ko‘pi ma’rifatli bo‘lishini anglatishini u birinchilardan bo‘lib ta’kidlagan.

Xulosa o‘rnida

// ================================================================
// HOLAT
// ================================================================
let selectedJadid = null;
let currentType   = null;
let navHistory    = ['jadidlar-page'];

// ================================================================
// SAHIFALAR
// ================================================================
function showPage(pageId) {
  ['jadidlar-page','jadid-menu-page','content-page'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('active');
    el.style.display = 'none';
  });
  const target = document.getElementById(pageId);
  target.classList.add('active');
  target.style.display = 'block';
  window.scrollTo(0, 0);

  const backBtn   = document.getElementById('back-btn');
  const headerSub = document.getElementById('header-sub');
  if (pageId === 'jadidlar-page') {
    backBtn.style.display = 'none';
    headerSub.textContent = 'Jadidni tanlang';
  } else {
    backBtn.style.display = 'flex';
    headerSub.textContent = selectedJadid ? selectedJadid.name : '';
  }
}

function goBack() {
  stopAudio();
  navHistory.pop();
  showPage(navHistory[navHistory.length - 1]);
}

// ================================================================
// RO'YXAT
// ================================================================
function renderJadidlar(list) {
  const container = document.getElementById('jadidlar-list');
  container.innerHTML = '';
  list.forEach(jadid => {
    const card = document.createElement('div');
    card.className = 'jadid-card';
    card.innerHTML = `
      <div class="jadid-avatar">${jadid.initials}</div>
      <div class="jadid-info">
        <h3>${jadid.name}</h3>
        <p>${jadid.years}</p>
      </div>
      <span class="arrow">›</span>`;
    card.onclick = () => selectJadid(jadid);
    container.appendChild(card);
  });
}

function filterJadidlar(q) {
  renderJadidlar(jadidlar.filter(j => j.name.toLowerCase().includes(q.toLowerCase())));
}

// ================================================================
// JADID TANLASH
// ================================================================
function selectJadid(jadid) {
  selectedJadid = jadid;
  document.getElementById('hero-avatar').textContent = jadid.initials;
  document.getElementById('hero-name').textContent   = jadid.name;
  document.getElementById('hero-years').textContent  = jadid.years;
  navHistory.push('jadid-menu-page');
  showPage('jadid-menu-page');
}

// ================================================================
// KONTENT
// ================================================================
function showContent(type) {
  currentType = type;
  stopAudio();

  const titles = {
    bio:   '📖 ' + selectedJadid.name + ' — Avtobiografiya',
    hayot: '🌟 ' + selectedJadid.name + ' — Hayoti va ijodi',
    asar:  '📝 ' + selectedJadid.name + ' — Asarlari'
  };

  document.getElementById('content-title').textContent = titles[type];
  document.getElementById('content-text').textContent  = selectedJadid[type] || '(matn kiritilmagan)';

  const audioUrl = selectedJadid.audio && selectedJadid.audio[type];
  const player   = document.getElementById('audio-player');
  const noAudio  = document.getElementById('no-audio-msg');

  if (audioUrl) {
    player.src = audioUrl;
    player.load();
    player.style.display = 'block';
    noAudio.style.display = 'none';
  } else {
    player.src = '';
    player.style.display = 'none';
    noAudio.style.display = 'block';
  }

  navHistory.push('content-page');
  showPage('content-page');
}

function stopAudio() {
  const player = document.getElementById('audio-player');
  if (player) { player.pause(); player.currentTime = 0; }
}

// ================================================================
// TELEGRAM
// ================================================================
if (window.Telegram && window.Telegram.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}

document.addEventListener('DOMContentLoaded', function() {
  const fp = document.getElementById('jadidlar-page');
  fp.style.display = 'block';
  fp.classList.add('active');
  renderJadidlar(jadidlar);
});
</script>
