<script>

const jadidlar = [

  // 1. BEHBUDIY
  {
    id: "behbudi", name: "Mahmudxo'ja Behbudiy", years: "1875 – 1919", initials: "B",
    bio: `1. Tug‘ilishi va Kelib Chiqishi
Mahmudxo'ja Behbudiy 1875-yil 19-yanvarda Samarqand yaqinidagi Baxshitepa qishlog‘ida, ruhoniy oilasida dunyoga kelgan. Uning otasi Ismoilxo‘ja islom huquqi bo‘yicha yirik mutaxassis bo‘lib, o‘g‘lining bilimli bo‘lishiga katta e’tibor bergan. Behbudiy yoshligidanoq o‘tkir zehnli bo‘lib, o‘z davrining diniy va dunyoviy ilmlarini puxta egallagan.

2. Sayohatlar va Dunyoqarashning Shakllanishi
Behbudiyning dunyoqarashi uning sayohatlari davomida tubdan o‘zgardi. U haj safari va boshqa maqsadlar bilan quyidagi shaharlarda bo‘ldi:

Makka va Madina

Misr (Qohira)

Turkiya (Istanbul)

Rossiya (Peterburg, Moskva, Qozon)

Ushbu sayohatlar davomida u musulmon dunyosining qoloqligini va Yevropa taraqqiyotini solishtirib, yagona najot ma'rifat va ta'limda ekanligini tushunib yetdi.

3. "Padarkush" — Millat Uyg‘onishi Uchun Bong
1911-yilda Behbudiy o‘zining mashhur "Padarkush" dramasini yozdi. Bu asar o‘zbek dramaturgiyasining birinchi namunasi hisoblanadi.

Asosiy g‘oyasi: O‘qimagan farzandning o‘z otasining qotiliga aylanishi orqali ilmsizlikning dahshatli oqibatlarini ko‘rsatib berish.

Ta'siri: Ushbu drama butun Turkistonda katta shov-shuvga sabab bo‘ldi va odamlarni farzandlarini maktabga berishga chorladi.

4. Matbuot va Nashriyot Faoliyati
Behbudiy o‘zining "Behbudiya" nashriyotiga asos soldi. U orqali millatni uyg‘otuvchi gazeta va jurnallarni chop etdi:

"Samarqand" gazetasi (1913-yil)

"Oyna" jurnali (1913–1915-yillar) — Bu jurnal jadidchilikning eng nufuzli nashrlaridan biri bo‘lib, unda ilm, til, tarix va madaniyat masalalari ko‘tarilgan.

5. Ta'lim Islohotchisi
Behbudiy "Usuli jadid" (yangi usul) maktablari uchun bir qator darsliklar yaratdi:

“Muntahabi jug‘rofiyai umumiy” (Geografiya)

“Kitobat ul-atfol” (Xat savodi)

“Amaliyoti islom”

Uning eng mashhur shiori :

"Dunyo imoratlari ichida eng ulug‘i maktabdir."

6. Fojiali Yakun
1919-yilda Behbudiy safarga chiqqanida Qarshi shahrida Buxoro amirligi amaldorlari tomonidan qo‘lga olinadi va qiynoqlar bilan qatl etiladi. Uning vafoti butun turk dunyosi uchun katta yo‘qotish bo‘ldi. Sadriddin Ayniy uning vafotiga bag‘ishlab marsiyalar yozgan.`,
    hayot: `Mahmudxo‘ja Behbudiy (1875–1919) — turkiston jadidchilik harakatining asoschisi, buyuk ma’rifatparvar, dramaturg, publitsist va jamoat arbobi.

Hayot yo‘li
Tug‘ilishi: 1875-yil 19-yanvarda Samarqand shahrida muftiylar oilasida dunyoga kelgan.

Ta’limi: Dastlab madrasada tahsil olgan, so‘ngra o‘z ustida ishlab, arab, fors va rus tillarini mukammal egallagan. Islom huquqi bo‘yicha "muftiy" darajasiga ko‘tarilgan.

Sayohatlari: 1900-yillardan boshlab Misr, Turkiya, Rossiya va Arabiston bo‘ylab sayohat qilgan. Bu safarlar uning dunyoqarashini o‘zgartirib, Turkistonda ta’lim islohotini o‘tkazish g‘oyasini shakllantirgan.

Siyosiy faoliyati: 1917-yilgi inqilobiy jarayonlarda faol qatnashgan. "Sho‘roi islomiya" tashkilotiga rahbarlik qilgan va Turkiston muxtoriyati g‘oyasini qo‘llab-quvvatlagan.

Vafoti: 1919-yil bahorida safar chog‘ida Qarshi shahrida Buxoro amirligi amaldorlari tomonidan qo‘lga olingan va qatl etilgan.

Ijodiy va ma’rifiy faoliyati
Teatr: 1911-yilda o‘zbek dramaturgiyasining birinchi namunasi bo‘lgan "Padarkush" dramasini yozgan. Asar savodsizlikning fojiali oqibatlari haqida bo‘lib, 1913-yilda Samarqandda sahnalashtirilgan.

Matbuot: * 1913-yilda "Samarqand" gazetasini nashr etgan.

1913–1915-yillarda jadidlarning bosh nashri bo‘lgan "Oyna" jurnalini chiqargan.

Darsliklar: Yangi usul maktablari (Usuli jadid) uchun 10 dan ortiq darslik yozgan:

“Muntahabi jug‘rofiyai umumiy” (Geografiya)

“Kitobat ul-atfol” (Xat savodi)

“Amaliyoti islom”

“Muxtasari tarixi islom”

Maqolalari: Uning 300 dan ortiq maqolalari mavjud bo‘lib, ularda "ikki emas, to‘rt tilni bilish lozimligi", ayollar ma’rifati va milliy birlik masalalari ko‘tarilgan.

Asosiy g‘oyalari
"Haq olinur, berilmas!" — milliy ozodlik va huquqiy mustaqillik shiori.

"Dunyo imoratlari ichida eng ulug‘i maktabdir" — jamiyatni faqat bilim orqali o‘zgartirish mumkinligi haqidagi qarashi.

Til siyosati: Turkiston ahlining o‘z ona tili bilan birga rus va yevropa tillarini o‘rganishi tarafdori bo‘lgan.`,
    asar: `
Mahmudxo‘ja Behbudiy o‘zbek ma’rifatparvarlik harakatining asoschisi va jadidchilikning nazariyotchisi sifatida boy adabiy, publitsistik va ilmiy meros qoldirgan. Uning ijodiy faoliyatidagi eng muhim asari 1911-yilda yozilgan va 1913-yilda sahnalashtirilgan "Padarkush" dramasi bo‘lib, bu asar o‘zbek dramaturgiyasining tamal toshini qo‘ygan hamda o‘sha davrdagi jaholat, ilmsizlik va ma’naviy qashshoqlikni keskin tanqid ostiga olgan. Behbudiy faqat badiiy ijod bilan cheklanib qolmay, xalqning savodxonligini oshirish maqsadida darsliklar ham yaratgan; xususan, "Muntaxabi jug‘rofiyai umumiy" (Umumiy geografiya saylanmasi), "Kitobat ul-atfol" (Bolalar xati), "Amoliyoti islom" va "Muxtasari tarixi islom" kabi asarlari maktablarda asosiy qo'llanma bo'lib xizmat qilgan. Adibning publitsistik faoliyati ham g‘oyatda sermahsul bo‘lib, u "Oyna" jurnali va "Samarqand" gazetasidagi yuzlab maqolalarida til masalasi, millat istiqboli, turkiy xalqlarning birligi hamda dunyoviy ilmlarni egallash zaruratini targ‘ib qilgan. Shuningdek, uning sayohat xotiralari jamlangan "Qasdi safar" asari ham ma’rifiy ahamiyatga ega bo‘lib, unda musulmon olami va Yevropa taraqqiyoti qiyosiy tahlil etilgan. Behbudiy o'z asarlarida "Ikki emas, to'rt til lozim" g'oyasini ilgari surib, millatni dunyo miqyosiga olib chiqishni asosiy maqsad qilib qo'ygan.`,
    audio: { bio: BASE_URL + "/behbudiy_bio.MP3", 
            hayot: BASE_URL + "/behbudiy_hayot.MP3", 
            asar: BASE_URL + "/behbudiy_asar.MP3"
    }
  },

  // 2. FITRAT
  {
    id: "fitrat", name: "Abdurauf Fitrat", years: "1886 – 1938", initials: "F",
    bio: `Istanbul shahriga borib, 1909–1913-yillarda dorilfununda tahsil ko‘rdi.

Turkiyadagi muhit uning dunyoqarashini tubdan o‘zgartirdi. U yerda "Buxoro ta’limi maorif jamiyati"ni tuzib, jadidchilik harakatining faol namoyandalaridan biriga aylandi. Vatanga qaytgach, xalqni jaholatdan qutqarish, ta’limni isloh qilish va milliy mustaqillik g‘oyalarini targ‘ib qila boshladi.

Fitrat serqirra ijodkor edi. U ham adib, ham olim, ham davlat arbobi sifatida tanildi. Uning "Munozara", "Bayonoti sayyohi hindi" kabi asarlari jamiyatdagi illatlarni fosh etishga qaratilgan edi. Shuningdek, u o‘zbek tili grammatikasi, adabiyotshunoslik va musiqashunoslikka doir muhim ilmiy tadqiqotlar yaratdi. 1920-yillarda Buxoro Xalq Sovet Respublikasida maorif noziri va boshqa mas’ul lavozimlarda faoliyat yuritdi.`,
    hayot: `Abdurauf Fitrat 1886-yilda Buxoroda tug‘ildi. Uning hayoti va ijodi o‘zbek ma’rifatparvarlik harakati hamda jadidchilikning eng yorqin sahifalaridan birini tashkil etadi.

Fitrat Istanbul dorilfununida o‘qib qaytgach, adabiyot, tilshunoslik, tarix va san’at sohalarida sermahsul ijod qildi. Uning "Munozara" va "Bayonoti sayyohi hindi" asarlari Turkiston xalqi uyg‘onishida muhim turtki bo‘ldi. Adib "Abulfayzxon" tragediyasi orqali davlatchilik va adolat masalalarini ko‘tardi. "Qiyomat" hikoyasi va "Shaytanat" kabi asarlarida esa ijtimoiy illatlarni o‘tkir hajviya ostiga oldi.

U adabiyotshunos olim sifatida "O‘zbek adabiyoti namunalari" tazkirasini tuzdi, "Aruz haqida" ilmiy asarini yozdi. Tilshunoslik sohasida "Sarf" va "Nahv" darsliklarini yaratib, o‘zbek tili grammatikasini tizimga soldi. Musiqashunos sifatida "Shashmaqom" tarixiga oid tadqiqotlar o‘tkazdi.`,
    asar: `Abdurauf Fitrat ijodi o‘zbek adabiyoti va ilm-fani rivojiga ulkan hissa qo‘shgan boy merosdan iborat. Uning asarlari mavzu ko‘lami va janrlariga ko‘ra bir necha yo‘nalishga bo‘linadi.

Badiiy nasrda "Munozara", "Bayonoti sayyohi hindi" va "Rahbari najot" asarlari mashhur bo‘lib, ularda jamiyat taraqqiyotiga to‘siq bo‘layotgan illatlar va jaholat tanqid qilinadi. "Qiyomat" xayoliy hikoyasi hamda "Oq mozor", "Zayd va Zaynub" kabi asarlari o‘zbek nasrida o‘ziga xos o‘ringa ega.

Dramaturgiya sohasida Fitrat "Abulfayzxon" tragediyasi bilan o‘zbek adabiyotida tarixiy drama janrini yangi bosqichga ko‘tardi. Shuningdek, uning "Chin sevish", "Hind ixtilolchilari", "Sinfiy kurash" va "Arslon" kabi pyesalari sahnaga qo‘yilgan.

Ilmiy merosi juda salmoqli bo‘lib, tilshunoslikda "Sarf" va "Nahv" darsliklari, adabiyotshunoslikda "Aruz haqida", "Eski o‘zbek adabiyoti namunalari", "Adabiyot qoidalari" kabi fundamental tadqiqotlari yaratilgan. Musiqashunoslik yo‘nalishida "O‘zbek klassik musiqasi va uning tarixi" asari katta ahamiyatga ega.

Bundan tashqari, Fitrat o‘zining publitsistik maqolalari va "Yana yong‘in", "Mirrix yulduziga", "Shoir" kabi she’riy asarlari bilan milliy uyg‘onish g‘oyalarini ilgari surgan. Uning asarlari o‘zbek tili, tarixi va madaniyatini o‘rganishda hanuzgacha asosiy manbalardan biri bo‘lib xizmat qilmoqda.`,
    audio: { bio: BASE_URL + "/fitrat_bio.MP3", 
            hayot: BASE_URL + "/fitrat_hayot.MP3", 
            asar: BASE_URL + "/fitrat_asar.MP3"
    }
  },

  // 3. CHO'LPON
  {
    id: "cholpon", name: "Abdulhamid Cho'lpon", years: "1897 – 1938", initials: "CH",
    bio: `Abdulhamid Sulaymon o‘g‘li Cho‘lpon 1897-yilda Andijon shahrida tug‘ildi. Dastlabki ta’limni eski maktabda, so‘ngra madrasada oldi. Rus-tuzem maktabida tahsil ko‘rib, rus tili va adabiyoti bilan yaqindan tanishdi, sharq va g‘arb madaniyatini chuqur o‘rgandi.

Uning ijodiy faoliyati 1913-1914-yillardan boshlanib, "Qalandar", "Mirzaqalandar", "Andijonlik" kabi taxalluslar bilan matbuotda chiqishlar qildi. "Uyg‘onish", "Buloqlar", "Tong sirlari" kabi she’riy to‘plamlari bilan o‘zbek she’riyatiga yangi ruh va zamonaviy vaznlar olib kirdi. Adibning "Kecha va kunduz" romani o‘zbek nasrining yetuk namunalaridan biri hisoblanadi.

Cho‘lpon mohir tarjimon sifatida ham tanildi. U jahon adabiyoti durdonalarini, jumladan, Shekspirning "Hamlet", Pushkinning "Boris Godunov" va "Dubrovskiy" asarlarini o‘zbek tiliga yuksak mahorat bilan o‘girdi. Dramaturg sifatida "Yorqinoy", "Mushtumzo‘r", "O‘rtoq Qarshiboev" kabi pyesalarni yozib, milliy teatr rivojiga hissa qo‘shdi.

Uning hurlik va erkinlikni tarannum etuvchi asarlari sho‘ro hukumati tomonidan keskin tanqidga uchradi. Cho‘lpon bir necha bor ta’qib qilindi va qamoqqa olindi. 1938-yil 4-oktabrda Toshkentda qatl etildi. Adibning nomi va ijodi O‘zbekiston mustaqillikka erishgandan so‘ng rasman oqlanib, munosib e’tirof etildi.`,
    hayot: `Abdulhamid Cho‘lpon XX asr o‘zbek adabiyotining yirik namoyandasi, shoir, nosir, dramaturg va tarjimon hisoblanadi. Uning hayoti va ijodi milliy uyg‘onish hamda hurlik g‘oyalari bilan chambarchas bog‘liq.

Cho‘lpon o‘z ijodini she’riyatdan boshlagan bo‘lib, "Uyg‘onish", "Buloqlar", "Tong sirlari", "Soz" kabi to‘plamlari orqali o‘zbek she’riyatiga yangi uslub, teran lirizm va ramziylikni olib kirdi. Uning "Go‘zal", "Binafsha", "Kishan" kabi she’rlari milliy adabiyotning oltin fondidan joy olgan. Shoir she’riyatida vatan ishqi, erk sog‘inchi va ijtimoiy adolat mavzulari ustuvorlik qiladi.

Nasr sohasida Cho‘lpon "Kecha va kunduz" dilogiyasining birinchi qismi bilan o‘zbek romanchiligini yuksak bosqichga ko‘tardi. Mazkur asarda mustamlaka davridagi xalq hayoti, ijtimoiy tabaqalanish va milliy fojialar badiiy mahorat bilan tasvirlangan. Shuningdek, uning "Qor qo‘ynida lola", "Non yopishda" kabi hikoyalari o‘zbek realistik nasrining sara namunalaridir.

Dramaturg sifatida "Yorqinoy", "Xalil farang", "Chovli bayram" kabi pyesalar yaratib, milliy teatr repertuarini boyitdi. Cho‘lpon tarjima san’atining ham ustasi edi; u Shekspir, Pushkin, Gogol va Gorkiy asarlarini o‘zbek tiliga mahorat bilan o‘girib, xalqini jahon adabiyoti durdonalari bilan tanishtirdi. Uning butun ijodiy merosi o‘zbek tili va milliy o‘zlikni asrashga qaratilgan.`,
    asar: `Abdulhamid Cho‘lponning asarlari o‘zbek adabiyotining barcha janrlarida yangi davrni boshlab bergan boy va serqirra merosdir. Uning ijodi she’riyat, nasr, dramaturgiya va tarjima yo‘nalishlarida o‘ziga xos maktab yaratgan.

She’riyatda Cho‘lpon "Uyg‘onish", "Buloqlar", "Tong sirlari" va "Soz" kabi to‘plamlari bilan mashhur. Uning "Go‘zal", "Binafsha", "Kishan", "Ko‘ngil", "Buzilgan o‘lkaga" kabi she’rlari milliy ozodlik g‘oyalari, lirik kechinmalar va ramziy tashbehlar bilan sug‘orilgan. Shoir o‘zbek she’riyatiga barmoq vaznining yangi va jozibador namunalarini olib kirdi.

Nasriy asarlari orasida "Kecha va kunduz" romani alohida o‘rin tutadi. Bu asar o‘zbek adabiyotidagi ilk realistik romanlardan biri bo‘lib, unda chorizm mustabidligi davridagi xalq hayoti, ijtimoiy tabaqalanish va milliy fojialar yuksak mahorat bilan tasvirlangan. Shuningdek, uning "Qor qo‘ynida lola", "Non yopishda", "Oydin kechalarda" kabi hikoyalari o‘zbek hikoyachiligi rivojiga ulkan hissa qo‘shdi.

Dramaturgiya sohasida "Yorqinoy", "Xalil farang", "Mushtumzo‘r", "O‘rtoq Qarshiboev" kabi pyesalari bilan milliy teatr repertuarini boyitdi. Bu asarlarda xalq og‘zaki ijodi motivlari va zamonaviy ijtimoiy muammolar uyg‘unlashgan.

Tarjima san’atida Cho‘lpon jahon adabiyoti durdonalarini o‘zbek tiliga mahorat bilan o‘girdi. Uilyam Shekspirning "Hamlet", Aleksandr Pushkinning "Boris Godunov" va "Dubrovskiy", Nikolay Gogolning "Revizor" asarlari aynan Cho‘lpon tarjimasida o‘zbek kitobxonlariga yetib bordi. Uning asarlari milliy til va adabiyotning go‘zalligini namoyon etuvchi o‘lmas merosdir.`,

    id: "qodiriy", name: "Abdulla Qodiriy", years: "1894 – 1938", initials: "Q",
    bio: `Abdulla Qodiriy 1894-yil 10-aprelda Toshkentning Qodiriyat mahallasida bog‘bon oilasida dunyoga keldi. Dastlab eski maktabda, so‘ngra rus-tuzem maktabida va madrasada tahsil oldi. Yoshligidan boylarning qo‘lida xizmatchilik qilib, hayotning qiyinchiliklarini o‘z ko‘zi bilan ko‘rdi.

Uning ijodiy faoliyati 1913-1914-yillarda boshlandi. Dastlab "To‘y", "Ahvoli mahzunimiz" kabi she’rlari, "Baxtsiz kuyov" dramasi va "Juvonboz" hikoyasi bilan tanildi. "Mushtum" jurnalining asoschilaridan biri bo‘lib, "Olg‘iboy", "Kalvak Maxzum", "Toshpo‘lat tajang" kabi hajviy obrazlar orqali jamiyatdagi eskicha qarashlar va illatlarni fosh etdi.

Abdulla Qodiriy o‘zbek adabiyotida tarixiy romanchilik asoschisi hisoblanadi. Uning 1922-yilda yozila boshlangan "O‘tkan kunlar" va undan keyingi "Mehrobdan chayon" romanlari o‘zbek nasrini jahon miqyosiga olib chiqdi. Bu asarlarda milliy tarix, sof muhabbat va mustamlakachilik davridagi ijtimoiy ziddiyatlar yuksak badiiy mahorat bilan tasvirlangan.

Adibning milliy istiqlol va xalq dardi bilan sug‘orilgan qarashlari sho‘ro hukumati tomonidan xavfli deb topildi. U bir necha bor qatag‘on qilinib, 1938-yil 4-oktabrda Toshkentda qatnashgan holda qatl etildi. Abdulla Qodiriy merosi mustaqillik yillarida qayta tiklanib, unga "Mustaqillik" ordeni va Alisher Navoiy nomidagi Davlat mukofoti berildi.`,
    hayot: `Abdulla Qodiriy o‘zbek adabiyotining ulkan namoyandasi, milliy romanchilik maktabining asoschisidir. Uning hayoti va ijodiy yo‘li o‘zbek madaniyatining yangi davrga o‘tishida poydevor vazifasini o‘tadi.

Adib ijodining ilk davrida "Baxtsiz kuyov" dramasi, "Juvonboz", "Uloqda" kabi hikoyalari bilan jadid adabiyoti vakili sifatida namoyon bo‘ldi. U o‘z asarlarida xalqni ma’rifatga chorlash, xotin-qizlar huquqini himoya qilish va jamiyatni isloh qilish g‘oyalarini ilgari surdi. "Mushtum" jurnali tarkibidagi faoliyati davomida yuzlab hajviy maqolalar va feletonlar yozib, xalq orasida "Kalvak Maxzum", "Toshpo‘lat tajang" kabi o‘lmas xarakterlarni yaratdi.

Qodiriy ijodining cho‘qqisi "O‘tkan kunlar" va "Mehrobdan chayon" tarixiy romanlaridir. Bu asarlar bilan o‘zbek adabiyotida professional romanchilikka asos solindi. "O‘tkan kunlar"da muallif xonliklar davridagi ichki nizolar va mustamlakachilik ostonasidagi turmush tarzini Kumush va Otabekning fojiaviy muhabbati orqali tasvirladi. "Mehrobdan chayon" romanida esa ulamolar niqobi ostidagi kirdikorlar va ijtimoiy adolatsizliklar fosh etildi.

Uning hayoti murakkab kechdi. Milliy istiqlol va hurlik haqidagi fikrlari uchun sovet hukumati tomonidan doimiy ta’qibda bo‘ldi. Adib hayotining so‘nggi yillarida "Obid ketmon" qissasini yozdi va Amir Temur haqida tarixiy roman yaratishni rejalashtirgan edi. Biroq 1937-yilda qamoqqa olinib, 1938-yil 4-oktabrda otib tashlandi. Abdulla Qodiriyning boy adabiy merosi bugungi kunda o‘zbek milliy g‘ururi va ma’naviyatining ajralmas qismidir.`,
    asar: `Abdulla Qodiriyning adabiy merosi o‘zbek adabiyoti xazinasining eng qimmatli durdonalaridan biri bo‘lib, janr va mavzu jihatidan juda rang-barangdir.

Uning ijodiy cho‘qqisi o‘zbek romanchiligiga asos solgan "O‘tkan kunlar" (1922-1925) va "Mehrobdan chayon" (1928) tarixiy romanlaridir. Bu asarlar milliy o‘zlik, sof muhabbat va tarixiy haqiqatni badiiy tasvirlashning eng yuksak namunasi hisoblanadi. Shuningdek, adib qishloq hayoti va jamoalashtirish mavzusida "Obid ketmon" (1934) qissasini yaratdi.

Badiiy nasrning kichik janrlarida ham samarali ijod qilib, "Juvonboz" (1915), "Uloqda" (1916) kabi hikoyalari va milliy dramaturgiyaga qo‘shilgan muhim hissa — "Baxtsiz kuyov" (1915) dramasini yozdi. Publisistika va hajviyot sohasida "Mushtum" jurnalidagi faoliyati davomida "Kalvak Maxzumning xotira daftaridan" hamda "Toshpo‘lat tajang nima deydi?" kabi turkum hajviy asarlari orqali jamiyatdagi illatlarni o‘tkir tanqid ostiga oldi.

She’riyatda esa "Ahvoli mahzunimiz", "To‘y", "Millatimga" kabi she’rlari bilan xalqni ma’rifat va uyg‘onishga chorladi. Abdulla Qodiriy asarlari o‘zbek tilining boyligi va latofatini namoyon etuvchi o‘lmas manbadir.`,

    bio: `1. Bolalik va Yoshlik Yillari
Abdulla Avloniy 1878-yil 12-iyulda Toshkentning Mergancha mahallasida kosib oilasida dunyoga kelgan.

Ta’limi: Dastlab eski maktabda, so‘ngra madrasada tahsil olgan. Biroq uning asosiy bilim manbai mustaqil mutolaa bo‘lgan. U arab, fors va tatar tillarini mukammal o‘rgangan, bu esa unga Sharq klassik adabiyoti va o‘sha davrdagi ilg‘or g‘oyalar bilan yaqindan tanishish imkonini bergan.

Mehnat faoliyati: Oilaviy sharoiti tufayli yoshligidan mehnatga aralashgan. U g‘isht quyuvchi, binokor bo‘lib ishlagan. Shuning uchun ham uni xalq orasida "Imoratchi usta" deb ham bilishgan.

2. Jadidchilik va Ma’rifatparvarlik
Avloniy O‘rta Osiyoda jadidchilik harakatining asoschilaridan biri hisoblanadi. U millatni uyg‘otishning yagona yo‘li — ilm va tarbiya ekanligini anglab yetgan.

Usuli jadid maktablari: 1904-yilda Toshkentning Mirobod mahallasida, keyinchalik esa boshqa joylarda yangi usuldagi maktablar ochgan.

Darsliklar yaratish: U yoshlar uchun zamonaviy darsliklar yozishga kirishgan. Uning "Birinchi muallim", "Ikkinchi muallim", "Turkiy Guliston yoxud axloq" asarlari o‘sha davr ta’lim tizimida inqilob yasagan. Ayniqsa, "Turkiy Guliston yoxud axloq" asari bugungi kunda ham o‘zbek pedagogikasining oltin merosi hisoblanadi.

3. Adabiy va Dramatik Faoliyat
Avloniy o‘z ijodini millatning dardini kuylashga va uni isloh qilishga qaratgan.

She’riyati: U "Hijron" taxallusi bilan she’rlar yozgan. Uning she’rlarida milliy ozodlik, ilmga chorlov va jaholatga qarshi nafrat yaqqol sezilib turadi.

Teatr: Avloniy o‘zbek teatri asoschilaridan biridir. U 1913-yilda "Turon" truppasini tashkil etgan.

Dramaturgiya: "Advokatlik osonmi?", "Pinak", "Biz va siz", "Portugaliya inqilobi" kabi dramalari orqali jamiyatdagi illatlarni hajviy va tanqidiy ruhda ko‘rsatib bergan.

4. Jurnalistika va Ijtimoiy-siyosiy Hayot
U matbuotni "millatning ko‘zgusi" deb bilgan va o‘zbek jurnalistikasi rivojiga ulkan hissa qo‘shgan.

Nashrlar: "Shuhrat" (1907), "Osiyo" (1908), "Turan" (1917) kabi gazetalarni tashkil qilgan va ularda muharrirlik qilgan.

Diplomatiya: 1920-yillarda Afg‘onistonda diplomatik missiya tarkibida xizmat qilgan (Sovet Ittifoqining Afg‘onistondagi konsuli bo‘lgan).

5. Mashhur Iqtiboslari
Avloniyning qarashlarini quyidagi mashhur jumlasi orqali tushunish mumkin:

"Tarbiya biz uchun yo hayot — yo mamot, yo najot — yo halokat, yo saodat — yo falokat masalasidir."

6. Umrining Oxiri va Merosi
Abdulla Avloniy hayotining so‘nggi yillarida O‘rta Osiyo davlat universitetida (hozirgi O‘zMU) dars bergan, professor unvoniga ega bo‘lgan. U 1934-yil 25-avgustda Toshkentda vafot etgan.

Bugungi kunda uning nomi Toshkentdagi markaziy ko‘chalardan biriga, xalq ta’limi xodimlarini qayta tayyorlash institutiga berilgan. Uning asarlari maktab darsliklarining ajralmas qismiga aylangan.`,
    hayot: `Abdulla Avloniy — o‘zbek ma’rifatparvarlik adabiyotining yirik vakili, iste’dodli shoir, dramaturg, jurnalist va zamonaviy pedagogika asoschilaridan biri. Uning hayoti va ijodi o‘zbek xalqining ma’naviy uyg‘onish davri bilan chambarchas bog‘liq.
​1. Hayot yo‘li
​Abdulla Avloniy 1878-yil 12-iyulda Toshkentning Mergancha mahallasida tug‘ilgan. Uning bolaligi va yoshligi oson kechmagan:
​Ta’limi: Dastlab eski maktabda, so‘ngra madrasada o‘qidi. Biroq u faqat diniy bilimlar bilan cheklanib qolmay, mustaqil ravishda rus tili va dunyoviy fanlarni o‘rgandi.
​Kasbi: O‘z xarajatlarini qoplash uchun yoshligidan binokorlik va ganchkorlik bilan shug‘ullangan, xalq orasida u "Imoratchi usta" sifatida ham tanilgan.
​Jamoat ishlari: 1917-yilgi inqilobdan keyin u turli davlat lavozimlarida ishladi, Afg‘onistonda diplomatik missiyalarda qatnashdi va umrining oxirigacha O‘rta Osiyo davlat universitetida (hozirgi O‘zMU) dars berdi.
​2. Pedagogik faoliyati: "Yangi usul" maktablari
​Avloniy millatni uyg‘otishning yagona yo‘li — ta’limda deb bildi. 1904-yilda u Toshkentning Mirobod mahallasida jadid maktabini ochdi.
​Darsliklar yaratishi: U yangi maktablar uchun zamonaviy darsliklar yozdi. Ularning ichida eng mashhurlari:
​“Birinchi muallim”
​“Ikkinchi muallim”
​“Turkiy Guliston yoxud axloq” (Bu asar hozir ham axloqshunoslikning eng sara namunasi hisoblanadi).
​Xayriya: U kambag‘al bolalarni o‘qitish uchun "Jamiyati xayriya" tashkilotini tuzishda jonbozlik ko‘rsatgan.
​3. Adabiy va badiiy ijodi
​Avloniy ijodi rang-barang: u ham shoir, ham dramaturg, ham publitsist edi.
​She’riyati
​U "Hijron" taxallusi bilan she’rlar yozgan. Uning she’rlarida millat qayg‘usi, ilmga chorlov va hurlik g‘oyalari ustuvor:
​"Adabiyot — har bir millatning ko‘zgusidir" — degan edi u.
​Dramaturgiyasi
​O‘zbek teatr san’atining shakllanishida Avloniyning o‘rni beqiyos. U 1913-yilda "Turon" teatr truppasini tashkil etgan. Uning qalamiga mansub sahna asarlari:
​“Advokatlik osonmi?” (Komediyasi orqali ijtimoiy illatlarni fosh qilgan)
​“Pinak”
​“Biz va siz”
​Jurnalistika
​U o‘zbek matbuotining "otaxonlaridan" biri. "Shuhrat" (1907), "Osiyo" kabi gazetalarni tashkil qilgan va ularda o‘tkir publitsistik maqolalari bilan xalqni fikrlashga chorlagan.
​4. "Turkiy Guliston yoxud axloq" asari
​Bu asar Avloniy ijodining cho‘qqisi hisoblanadi. Unda muallif insoniy fazilatlarni ikki guruhga bo‘lib tushuntiradi:
​Yaxshi xulqlar: Sabr, intizom, adolat, iffat, shijoat va boshqalar.
​Yomon xulqlar: G‘azab, jaholat, kibr, hasad.
​U axloqni shunchaki nazariya emas, balki jamiyatni o‘zgartiruvchi kuch deb bildi. Uning mashhur jumlasi bor:
​"Tarbiya biz uchun yo hayot — yo mamot, yo najot — yo halokat, yo saodat — yo falokat masalasidir."
​5. Xotira va e’tirof
​Abdulla Avloniy 1934-yil 25-avgustda Toshkentda vafot etgan. Mustaqillik yillarida uning nomi munosib e’zozlandi:
​"Buyuk xizmatlari uchun" ordeni bilan taqdirlangan (vafotidan so‘ng).
​Ko‘plab ko‘chalar, maktablar va pedagogika institutlariga uning nomi berilgan.
​Abdulla Avloniyning hayoti — o‘z xalqi va vatanining ma’rifati yo‘lida fido qilingan umr namunasidir.`,
    asar: `1. Pedagogik Merosi: "Insoniyatning Komillik Dasturi"
Avloniyning darsliklari shunchaki o‘quv qo‘llanma emas, balki yangi dunyoqarashni shakllantirish vositasi bo‘lgan.

"Turkiy Guliston yoxud axloq": Bu asar 20-asr boshidagi o‘zbek pedagogikasining eng yuksak cho‘qqisidir. Avloniy unda inson xulqini ilmiy va falsafiy asoslab beradi. Uning fikricha, axloq tug‘ma emas, balki tarbiya natijasidir. Asarda "Haqgo‘ylik", "Vatanparvarlik", "Ilm-ma’rifat" kabi tushunchalar milliy ruh bilan sug‘orilgan holda tushuntiriladi. Masalan, u Vatanni sevishni iymonning bir qismi deb ta’riflaydi va buni amaliy ishlar bilan isbotlash kerakligini uqtiradi.

"Birinchi muallim" va "Ikkinchi muallim": Bu darsliklar orqali Avloniy savod chiqarishning oson va qiziqarli usulini joriy qildi. U eski maktablardagi "abjad" usulidan voz kechib, tovush tizimiga asoslangan ta’limni yo‘lga qo‘ydi. Bu kitoblar o‘z davrida o‘nlab marta qayta nashr etilgani ularning naqadar zarur bo‘lganini ko‘rsatadi.

2. Dramaturgiya: Teatr orqali "Uyg'onish"
Avloniy dramaturgiyasi jamiyatdagi og‘riqli nuqtalarni ochiq-oydin ko‘rsatib bergan. Uning pyesalari tili xalqona, kinoya va kesatiqlarga boy.

"Advokatlik osonmi?": Bu pyesada muallif shunchaki kulgi uchun yozmagan. U ilm-ma’rifatsiz, tili boshqa-yu, dili boshqa bo‘lgan "soxta ziyolilar"ning qiyofasini ochib tashlagan. Asar orqali u xalqni o‘z huquqini bilishga va aldov qurboni bo‘lmaslikka chaqiradi.

"Pinak" va "Biz va Siz": Bu asarlarida u millatning ichki illatlari — ko‘r-ko‘rona an’analarga yopishib olish, yangilikdan qo‘rqish va maishiy buzuqliklarni ayovsiz tanqid qilgan. U sahnani xalq uchun oyna deb bilgan va bu oynada xalq o‘zining nuqsonlarini ko‘rib, ulardan qutulishi kerakligini maqsad qilgan.

3. "Hijron" She’riyati: Milliy Iztirob va Umid
Avloniyning she’riy merosi uning "Adabiyot yoxud milliy she’rlar" to‘plamida jamlangan. Uning poeziyasi klassik g‘azalchilik an’analarini zamonaviy ijtimoiy g‘oyalar bilan birlashtirgan.

Mavzu ko‘lami: Uning she’rlarida Vatan — muqaddas maskan, millat esa — o‘z yo‘lini yo‘qotgan, lekin uyg‘onishga qodir ulkan kuch sifatida tasvirlangan.

Ma’rifatga chorlov: U yoshlarni Yevropa va dunyo tillarini o‘rganishga, texnika va fan sirlarini egallashga chaqiradi. Uning "Ilm o‘qung" kabi misralari o‘sha davr yoshlari uchun shior bo‘lib xizmat qilgan.

4. Matbuot va Maqolanavislik
Avloniy o‘zbek matbuoti tarixida o‘chmas iz qoldirgan. U o‘zining publitsistik maqolalarida quyidagi masalalarni ko‘targan:

Maktab islohoti: Maktablarni zamonaviy asbob-uskunalar bilan jihozlash va o‘qituvchilarning saviyasini oshirish.

Iqtisodiy mustaqillik: Millatning o‘z sanoati va savdo tizimiga ega bo‘lishi zarurligi.

Xotin-qizlar ozodligi: Ayollarning bilimli bo‘lishi jamiyatning yarmidan ko‘pi ma’rifatli bo‘lishini anglatishini u birinchilardan bo‘lib ta’kidlagan.

Xulosa o‘rnida
Abdulla Avloniyning barcha asarlarini birlashtirib turadigan bitta bosh g‘oya bor: Ma’rifat orqali Ozodlikka erishish. U insonni ma’naviy va intellektual jihatdan yuksaltirish orqali millatning taqdirini o‘zgartirish mumkinligiga ishongan. Uning asarlari bugun ham o‘z ahamiyatini yo‘qotmagan bo‘lib, o‘zbek adabiyoti va pedagogikasining poydevori hisoblanadi.`,

  {
    id: "munavvar", name: "Munavvar Qori Abdurashidxonov", years: "1878 – 1931", initials: "M",
    bio: `Munavvar qori Abdurashidxonov 1878-yilda Toshkentning Shayxontohur dahasidadi Darxon mahallasida ziyoli oilasida dunyoga keldi. Dastlabki ta’limni ota-onasi va mahalliy maktabda olgach, Buxorodagi Mir Arab madrasasida tahsilini davom ettirdi. Toshkentga qaytib, o‘z davrining mashhur mudarrisi Eshonxo‘ja akadan saboq oldi.

U 1901-yilda Toshkentda birinchilardan bo‘lib "usuli jadid" maktabini ochdi va ushbu maktablar uchun "Adibi avval", "Adibi soniy" kabi darsliklar yaratdi. Munavvar qori nafaqat pedagog, balki mohir publitsist sifatida ham tanildi; u "Xurshid" gazetasini tashkil etdi, "Najot" va "Kengash" jurnallarida muharrirlik qildi, "Taraqqiy" va "Sadoi Turkiston" nashrlarida faol qatnashdi.

1917-yilgi inqilobiy o‘zgarishlar davrida "Sho‘royi Islomiya" tashkilotini tuzib, milliy mustaqillik va muxtoriyat g‘oyalarini ilgari surdi. Turkiston muxtoriyati uchun kurashgan siyosiy arbob sifatida xalqni birlashtirishga intildi. 1920-yillarda "Nashri maorif" jamiyatini tuzib, o‘zbek yoshlarini xorijga, jumladan Germaniyaga o‘qishga yuborish tashabbuskori bo‘ldi.

Biroq uning milliy ozodlik borasidagi qarashlari sovet tuzumi tomonidan keskin rad etildi. Munavvar qori bir necha bor qamoqqa olindi va "Milliy ittihod" tashkilotiga rahbarlikda ayblandi. 1931-yil 23-mayda Moskvadagi Butirka qamoqxonasida qatl etildi. Uning nomi va merosi mustaqillik yillaridagina to‘liq tiklanib, munosib e’tirofga loyiq ko‘rildi.`,
    hayot: `Munavvar qori Abdurashidxonovning hayot yo‘li Turkiston jadidchilik harakatining shakllanishi va rivojlanishi bilan uzviy bog‘liqdir. U o‘z davrining eng yirik ma’rifatparvarlaridan biri sifatida millatning dunyoqarashini o‘zgartirishga butun umrini bag‘ishladi.

Uning hayoti faqat ta’lim bilan cheklanib qolmagan. Munavvar qori jamiyatning har bir jabhasida islohotlar o‘tkazishga intildi. 1901-yilda o‘z hovlisida ochgan "usuli jadid" maktabi orqali xalqning savodxonlik darajasini oshirishga va zamonaviy ilmlarni o‘rgatishga kirishdi. Uning hayotidagi eng muhim tamoyillardan biri — xalqni jaholat botqog‘idan qutqarish uchun matbuot va maktabni asosiy qurol deb bilishi edi.

Siyosiy maydonda u Turkiston mustaqilligi g‘oyasining otalaridan biri hisoblanadi. 1917-yilda "Sho‘royi Islomiya" tashkilotiga rahbarlik qilgan davrida milliy davlatchilik asoslarini yaratish ustida ishladi. U o‘sha davrdagi barcha siyosiy jarayonlarda faol ishtirok etib, Turkiston muxtoriyatini qo‘llab-quvvatladi.

Munavvar qori hayotining so‘nggi yillari sovet tuzumi tomonidan tinimsiz ta’qib va bosimlar ostida o‘tdi. U 1920-yillarda ham ma’rifatparvarlik ishlarini to‘xtatmadi, yoshlarni ilm-fanga yo‘naltirishda davom etdi. Biroq, "xalq dushmani" sifatida bir necha bor hibsga olindi va Moskvaga olib ketildi. 1931-yilda qatl etilgunga qadar u o‘z e’tiqodi va milliy mustaqillik g‘oyalaridan qaytmadi. Uning jasorati va fidoyiligi o‘zbek milliy uyg‘onish tarixida o‘chmas iz qoldirdi.`,
    asar: `Munavvar qori Abdurashidxonovning asarlari asosan pedagogika, darslik yaratish va milliy matbuotni shakllantirishga qaratilgan bo‘lib, o‘zbek ma’rifatparvarlik adabiyotining poydevori hisoblanadi.

Uning eng mashhur asarlari va darsliklari quyidagilardan iborat:

"Adibi avval" (Birinchi adib): Savod o‘rgatishga mo‘ljallangan ilk alifbe darsligi bo‘lib, unda dunyoviy bilimlar va axloqiy mavzular sodda tilda bayon etilgan.

"Adibi soniy" (Ikkinchi adib): "Adibi avval"ning davomi bo‘lib, o‘quvchilarning o‘qish va tushunish ko‘nikmalarini shakllantirishga xizmat qilgan majmuadir.

"Usuli hisob": Matematika fanini o‘rgatishga mo‘ljallangan darslik bo‘lib, jadid maktablarida aniq fanlarni o‘qitishni tizimlashtirgan.

"Tarixi islom": Islom dini tarixi va asoslarini o‘rgatuvchi qo‘llanma.

"Yer yuzi": Geografiya faniga oid bilimlarni o‘z ichiga olgan darslik.

"Tajvidul Qur’on": Qur’on qiroati qoidalariga bag‘ishlangan asar.

Shuningdek, u yuzlab publitsistik maqolalar muallifidir. Uning "Bizning holimiz", "Islohot kerak" kabi maqolalarida xalqni uyg‘onishga, eskilik sarqitlaridan voz kechib, ilm-fanni egallashga chorlovchi o‘tkir mulohazalar ilgari surilgan. Munavvar qori o‘zining she’riy asarlari bilan ham milliy g‘urur va istiqlol g‘oyalarini tarannum etgan`,
    audio: { bio: null, hayot: null, asar: null }
  },

  // 7. HAMZA
  {
    id: "hamza", name: "Hamza Hakimzoda Niyoziy", years: "1889 – 1929", initials: "H",
    bio: `Hamza Hakimzoda Niyoziy 1889-yil 6-martda Qo‘qon shahrida tabib oilasida dunyoga keldi. Dastlabki ta’limni eski maktabda va madrasada oldi. Dunyoviy bilimlarini oshirish maqsadida rus-tuzem maktabida ham tahsil ko‘rdi.

Uning ijodiy faoliyati 1905-1906-yillarda boshlanib, dastlab "Nihon" taxallusi bilan she’rlar yozdi. 1914-yilda "Devoni Nihon" nomi bilan o‘z she’riy to‘plamini tuzdi. Hamza ma’rifatparvar sifatida Qo‘qon va boshqa shaharlarda jadid maktablarini ochdi hamda kambag‘al bolalar uchun bepul ta’lim tashkil etdi. Ushbu maktablar uchun "Yengil adabiyot", "O‘qish kitobi", "Qiroat kitobi" kabi darsliklar yaratdi.

Dramaturgiya sohasida Hamza o‘zbek teatri taraqqiyotiga ulkan hissa qo‘shdi. Uning "Boy ila xizmatchi", "Maysaraning ishi", "Paranji sirlaridan bir lavha" kabi asarlari o‘zbek dramaturgiyasining klassik namunalari hisoblanadi. Shuningdek, u kompozitor sifatida ko‘plab xalqchil qo‘shiqlar va marshlar yaratib, milliy musiqa san’atini rivojlantirdi.

Hamza hayotining so‘nggi yillarida ijtimoiy va siyosiy faollik ko‘rsatdi. Biroq uning qarashlari va faoliyati ayrim dindor va konservativ qatlamlar orasida keskin norozilik uyg‘otdi. 1929-yil 18-martda Farg‘ona viloyatining Shohimardon qishlog‘ida fojiali ravishda halok bo‘ldi. Hamza Hakimzoda Niyoziy o‘zbek adabiyoti, teatri va musiqasining asoschilaridan biri sifatida tarixda qoldi.`,
    hayot: `Hamza Hakimzoda Niyoziyning hayoti ma’rifatparvarlik, ijodiy izlanish va ijtimoiy kurashlarga boy bo‘ldi. U o‘z davrining o‘tkir ziddiyatlari markazida turib, millat madaniyatini yuksaltirishga intildi.

Uning hayot yo‘li bir necha muhim bosqichlardan iborat:

Ilk davr va ta’lim: Yoshligidan "Nihon" taxallusi bilan g‘azallar yozib, mumtoz adabiyot an’analarini davom ettirdi. Keyinchalik jadidchilik g‘oyalari ta’sirida dunyoviy ilmlarni targ‘ib qila boshladi.

Ma’rifatparvarlik faoliyati: 1910-yillarda Qo‘qon, Marg‘ilon va Namangan kabi shaharlarda maktablar ochdi. Bu maktablar uchun nafaqat darsliklar yozdi, balki o‘zi mudarrislik qilib, kambag‘al oilalar farzandlarini o‘qitdi. Uning hayotidagi eng katta maqsadi xalqni savodli qilish va madaniyatni ommalashtirish edi.

Sayohat va ijodiy yuksalish: 1913-1915-yillarda Hindiston, Afg‘oniston, Turkiya va Arab davlatlarida bo‘ldi. Bu sayohatlar uning dunyoqarashini kengaytirdi va ijtimoiy tengsizlikka qarshi kurashish xohishini kuchaytirdi. Qaytganidan so‘ng o‘zbek teatri truppalarini tashkil qilib, rejissyorlik va aktyorlik qildi.

Ijtimoiy-siyosiy faollik: 1917-yildan keyin sho‘ro hukumati bilan hamkorlik qilib, xalq maorifi va xotin-qizlar ozodligi masalalari bilan shug‘ullandi. U o‘z hayotini butunlay yangi madaniyat va san’at yaratishga bag‘ishladi.

Hamza hayotining so‘nggi yillari Shohimardonda o‘tdi. U yerda xalqni yangi turmush tarziga o‘rgatish, maktablar qurish bilan band bo‘ldi. Biroq, uning qarashlari o‘sha davrdagi ayrim guruhlarning keskin qarshiligiga sabab bo‘ldi va 1929-yilda fojiali o‘lim bilan yakunlandi. Uning hayoti o‘zbek san’ati va pedagogikasi tarixida fidoyilik namunasi bo‘lib qoldi.`,
    asar: `Hamza Hakimzoda Niyoziyning asarlari o‘zbek adabiyoti, teatri va musiqa san’atida inqilobiy ahamiyatga ega bo‘lib, janr jihatidan juda xilma-xildir.

Uning boy merosi quyidagi yo‘nalishlarni o‘z ichiga oladi:

She’riyat: "Nihon" taxallusi bilan yozilgan g‘azallarini o‘z ichiga olgan "Devoni Nihon" to‘plami mumtoz adabiyot an’analarini aks ettiradi. Shuningdek, milliy uyg‘onish ruhidagi "Milliy ashulalar uchun milliy she’rlar majmuasi" turkumiga kiruvchi "Gullar bog‘i", "Sariq gul", "Qizil gul" kabi to‘plamlari mashhur.

Dramaturgiya: Hamza o‘zbek sahnasining asoschilaridan biri sifatida "Boy ila xizmatchi" (1918) tragediyasini yaratdi. Uning "Maysaraning ishi" komediyasi va "Paranji sirlaridan bir lavha" dramasi ham o‘zbek teatri repertuarining oltin fondidan joy olgan. Bundan tashqari, "Zaharli hayot", "Muxtoriyat yoki avtonomiya" kabi pyesalari mavjud.

Nasr: Adibning "Yangi saodat" qissasi o‘zbek adabiyotidagi ilk qissalardan biri bo‘lib, unda ma’rifat va baxtli hayot g‘oyalari ilgari surilgan.

Pedagogika va darsliklar: Jadid maktablari uchun "Yengil adabiyot", "O‘qish kitobi", "Qiroat kitobi" kabi o‘quv qo‘llanmalarini yaratgan.

Musiqa: Hamza mohir kompozitor sifatida o‘z she’rlariga kuy bastalagan. Uning "Yana", "Holingiz", "Dardiga darmon istamas" kabi o‘nlab qo‘shiqlari va marshlari xalq orasida keng tarqalgan.

Hamza o‘z asarlari orqali o‘zbek adabiyotiga yangi shakl va ijtimoiy o‘tkir mavzularni olib kirdi.`,
    audio: { bio: null, hayot: null, asar: null }
  },

  // 8. GASPRINSKIY
  {
    id: "ismoil", name: "Ismoil Gasprinskiy", years: "1851 – 1914", initials: "G",
    bio: `Ismoilbek Gasprinskiy (Gasprali) 1851-yil 21-martda Qrimning Avjikoy qishlog‘ida harbiylar oilasida dunyoga keldi. Dastlabki ta’limni mahalla maktabida olgach, Simferopol erkaklar gimnaziyasida, so‘ngra Voronej va Moskvadagi harbiy kadetlar korpusida tahsil oldi. Rossiyadagi slavyanparastlik g‘oyalari uning turkiy xalqlar birligi va uyg‘onishi haqidagi dunyoqarashi shakllanishiga turtki bo‘ldi.

1870-yillarda Fransiya va Turkiyaga sayohat qilib, u yerda Yevropa madaniyati va islohotchilik harakatlarini chuqur o‘rgandi. Qrimga qaytgach, Baxchisaroy shahar hokimi (golovasi) etib saylandi. 1883-yildan boshlab butun turkiy dunyo uchun umumiy bo‘lgan "Tarjimon" gazetasini nashr eta boshladi. Bu gazeta turkiy xalqlar orasida "Tilda, fikrda, ishda birlik" shiorini yoyishda asosiy minbar vazifasini o‘tadi.

Gasprinskiy turkiy dunyoda ta’lim tizimini tubdan isloh qilish maqsadida "Usuli jadid" (yangi usul) maktablariga asos soldi. U 1884-yilda Baxchisaroyda ilk tajriba maktabini ochib, savod o‘rgatish muddatini bir necha yil oydan bir necha oygacha qisqartirdi. Uning bu tashabbusi qisqa vaqt ichida Turkiston, Tatariston, Kavkaz va boshqa hududlarda keng tarqalib, jadidchilik harakatining poydevori bo‘ldi.

Ismoilbek Gasprinskiy nafaqat ma’rifatparvar, balki mohir yozuvchi, jurnalist va jamoat arbobi sifatida tanildi. U musulmon yoshlari va xotin-qizlarining huquqlarini himoya qilish, ularni zamonaviy fanlarni egallashga chorlash yo‘lida ulkan ishlarni amalga oshirdi. Buyuk mutafakkir 1914-yil 11-sentabrda Baxchisaroyda vafot etdi. Uning g‘oyalari bugungi kunda ham turkiy xalqlar ma’naviy birligining ramzi bo‘lib xizmat qilmoqda.`,
    hayot: `Ismoilbek Gasprinskiyning asarlari turkiy dunyo ijtimoiy-siyosiy tafakkuri, badiiy nasri va pedagogikasini yangi bosqichga olib chiqqan muhim manbalardir. Uning ijodi ma’rifatparvarlik va milliy birlik g‘oyalari bilan sug‘orilgan.

Uning boy merosi quyidagi asosiy yo‘nalishlarga bo‘linadi:

Badiiy va Publisistik asarlari
"Fransiya maktublari": Bu asar orqali muallif Sharq dunyosiga Yevropa madaniyati, ilm-fani va ijtimoiy tuzilishini tahliliy nuqtai nazardan tanishtirgan.

"Dorur-rohat musulmonlari": Xayoliy (utopik) asar bo‘lib, unda musulmonlarning baxtli va rivojlangan jamiyati qanday bo‘lishi kerakligi haqidagi muallif orzulari aks etgan.

"Afrika maktublari" va "Yuz yildan so‘ng": Bu asarlarida Gasprinskiy musulmon olamining kelajagi, mustamlakachilikka qarshi kurash va taraqqiyot yo‘llari haqida mulohaza yuritadi.

"Rossiya musulmonlari": Rus tilida yozilgan ushbu publisistik asarida Rossiya imperiyasi tarkibidagi musulmon xalqlarning huquqiy va ijtimoiy holati, ularni isloh qilish zaruriyati ko‘tarilgan.

Pedagogik asarlari va darsliklari
"Xo‘jai sibyon" (Bolalar muallimi): "Usuli jadid" maktablari uchun yozilgan eng mashhur darslik bo‘lib, u tovush tizimiga asoslangan savod o‘rgatish metodikasini o‘z ichiga oladi.

"Rahbari muallimin" (O‘qituvchilar rahbari): Muallimlarga yangi usulda dars berish metodikasini o‘rgatuvchi metodik qo‘llanma.

Matbuot faoliyati
"Tarjimon" gazetasi: Gasprinskiyning eng katta "asari" bo‘lib, u 1883-yildan 1914-yilgacha nashr etilgan. Bu gazeta butun turkiy dunyo (Qrim, Kavkaz, Tatariston, Turkiston) uchun yagona adabiy til va g‘oyaviy markaz vazifasini o‘tagan.

"Olam-i nisvon" (Ayollar olami): Musulmon ayollari uchun mo‘ljallangan ilk jurnallardan biri bo‘lib, xotin-qizlar ma’rifati masalalarini yoritgan.

Ismoilbek Gasprinskiyning har bir asari "Tilda, fikrda, ishda birlik" shiorini amalga oshirishga va millatni jaholatdan qutqarishga xizmat qilgan.`,
    asar: `Ismoilbek Gasprinskiyning asarlari turkiy dunyo ijtimoiy-siyosiy tafakkuri, badiiy nasri va pedagogikasini yangi bosqichga olib chiqqan muhim manbalardir. Uning ijodi ma’rifatparvarlik va milliy birlik g‘oyalari bilan sug‘orilgan.

  // 9. AYNIY
  {
    id: "sadriddin", name: "Sadriddin Ayniy", years: "1878 – 1954", initials: "S",
    bio: `Sadriddin Ayniy 1878-yil 15-aprelda Buxoro amirligining G‘ijduvon tumanidagi Saktare qishlog‘ida tug‘ildi. Dastlab qishloq maktabida, so‘ngra Buxorodagi Mir Arab va Olimjon madrasalarida tahsil oldi. Yoshligida ota-onasi vabodan vafot etishi natijasida qiyin hayot kechirdi va turli ishlarda mehnat qildi.

Uning ijodi 1890-yillarda "Sifliy" va "Ayniy" taxalluslari bilan boshlangan. 1900-yillarning boshida jadidchilik harakatiga qo‘shilib, yangi usul maktablari uchun "Tahzibus-sibyon" darsligini yaratdi. Biroq jadidchilik faoliyati uchun Buxoro amiri tomonidan quvg‘in qilindi va 1917-yilda 75 darraga urilib, qamoqqa tashlandi. Rus askarlari tomonidan qutqarilib, Kogon kasalxonasida davolandi.

Ayniy yangi o‘zbek va tojik adabiyotining asoschisi sifatida tanildi. U o‘zbek tilida "Qullar", "Eski maktab" kabi asarlarni, tojik tilida esa "Doxunda", "Odina" kabi asarlarni yaratdi. Uning 1920-yillarda yozilgan "Buxoro jallodlari" va "Odina" asarlari ijtimoiy tengsizlikni fosh etdi. 1948–1954-yillarda yozilgan to‘rt jildlik "Esdaliklar" (Yoddoshtlar) asari uning ijodiy cho‘qqisi va o‘sha davr tarixining jonli ensiklopediyasi hisoblanadi.

Sadriddin Ayniy Tojikiston Fanlar akademiyasining birinchi prezidenti, O‘zbekiston Fanlar akademiyasining faxriy a’zosi bo‘ldi. Olim va adib sifatida ikki xalq adabiyoti va tarixini o‘rganishga ulkan hissa qo‘shdi. Buyuk yozuvchi 1954-yil 15-iyulda Dushanbe shahrida vafot etdi. Uning nomi bugungi kunda O‘zbekiston va Tojikistonda yuksak ehtirom bilan tilga olinadi.`,
    hayot: `Sadriddin Ayniyning hayoti Buxoro amirligining so‘nggi yillari va yangi davrning shakllanishi bilan bog‘liq bo‘lib, u mashaqqatli mehnat va ma’rifatga intilish yo‘lini bosib o‘tdi.

Uning hayoti quyidagi asosiy bosqichlardan iborat:

Yetimlik va ilm izlash: Saktare qishlog‘ida tug‘ilgan Sadriddin 12 yoshida ham ota, ham onasidan ajraladi. Ilm olishga bo‘lgan kuchli ishtiyoqi uni Buxoro madrasalariga yetaklaydi. U yerda uzoq yillar o‘ta qashshoqlikda yashab, madrasaning eng kichik hujralarida istiqomat qilgan holda tahsil oladi. Bu davrda u nafaqat diniy ilmlarni, balki Sharq klassik adabiyotini ham mukammal o‘rganadi.

Jadidchilik va ma’rifatparvarlik: XX asr boshlarida Buxorodagi jadidchilik harakatining faol a’zosiga aylanadi. U ma’rifatparvar do‘stlari bilan birga yangi usul maktablari ochishda qatnashadi va yosh avlod uchun zamonaviy darsliklar yozadi. Uning bu faoliyati amirlik tartiblariga zid keladi.

Amir qatag‘oni va jismoniy jazo: 1917-yilda jadidchilik g‘oyalari uchun Buxoro amiri tomonidan hibsga olinadi. Unga 75 darraga urish jazosi beriladi. Og‘ir jarohatlangan Ayniy Kogon shahrida davolanadi, biroq uning ukasi Sirojiddin amir buyrug‘i bilan qatl etiladi. Bu fojia uning ijodida zulmga qarshi nafratning kuchayishiga sabab bo‘ladi.

Ilmiy va ijtimoiy faoliyat: Keyinchalik u Samarqand va Toshkentda yashab, yangi davr madaniyati, tili va adabiyotini shakllantirishda qatnashadi. U tojik va o‘zbek tillarida baravar ijod qilib, har ikki xalqning adabiy merosini tadqiq etadi. Tojikiston Fanlar akademiyasining birinchi prezidenti sifatida ilm-fan rivojiga rahbarlik qiladi.

Sadriddin Ayniy hayotining so‘nggi yillarini Samarqandda o‘tkazdi va o‘zining ko‘p jildlik "Esdaliklar" asari orqali o‘zi guvoh bo‘lgan murakkab davr xotiralarini yozib qoldirdi.`,
    asar: `Sadriddin Ayniyning asarlari o‘zbek va tojik adabiyotida realizm janrining shakllanishida asosiy poydevor hisoblanadi. U o‘z asarlarida o‘tmishning murakkab manzaralarini, xalq hayoti va ijtimoiy o‘zgarishlarni butun borlig‘icha tasvirlagan.

Uning boy ijodiy merosi quyidagi asosiy yo‘nalishlarga bo‘linadi:

Badiiy nasri
"Qullar" (1934): Bu asar o‘zbek adabiyotidagi ilk roman-epopeyalardan biri bo‘lib, unda qariyb bir asrlik davr ichidagi xalq hayoti, qullikdan ozodlikka chiqish jarayoni keng qamrovda tasvirlangan.

"Buxoro jallodlari" (1922): Amirlik tuzumining shafqatsizligini, inson huquqlari va qadr-qimmati qanday toptalganini fosh qiluvchi qissa.

"Odina" (1924): Tojik tilida yozilgan ushbu asar kambag‘al tog‘lik yigitning fojiali taqdiri orqali ijtimoiy adolatsizliklarni ko‘rsatib bergan.

"Doxunda" (1930): Inqilobiy o‘zgarishlar davridagi tojik qishloqlaridagi hayot va kurashlar haqidagi roman.

"Sudxo‘rning o‘limi" (1939): O‘zbek va tojik adabiyotida xasislik va sudxo‘rlik illatlarini yuksak badiiy mahorat bilan fosh etgan qissa. Undagi Qori Ishkamba obrazi jahon adabiyotidagi mashhur xasis obrazlari qatorida turadi.

Avtobiografik asari
"Esdaliklar" ("Yoddoshtlar", 1948–1954): To‘rt jilddan iborat ushbu asar Ayniy ijodining gultoji hisoblanadi. Unda muallif o‘zi guvoh bo‘lgan Buxoro hayoti, madrasa o‘qishlari, tarixiy shaxslar va o‘sha davrning ijtimoiy manzaralarini nihoyatda aniq va jozibali tasvirlagan.

Ilmiy va pedagogik faoliyati
"O‘zbek adabiyoti namunalari" (1926): O‘zbek adabiyoti tarixini tizimlashtirishga qaratilgan birinchi yirik antologiya bo‘lib, unda ko‘plab shoir va adiblarning hayoti va ijodi haqida ma’lumot berilgan.

"Tahzibus-sibyon": Jadid maktablari uchun yozilgan darslik bo‘lib, yosh avlodni ma’rifatli qilish yo‘lidagi muhim qo‘llanma hisoblangan.

Tarixiy tadqiqotlar: U Firdavsiy, Rudakiy, Sa’diy Sheroziy, Ibn Sino va Alisher Navoiy kabi buyuk siymolar hayoti va ijodi haqida ilmiy asarlar yaratgan.

She’riyati
Ayniy dastlab "Sifliy" va keyinchalik "Ayniy" taxalluslari bilan g‘azallar va qasidalar yozgan. Uning she’rlarida klassik adabiyot an’analari bilan birga zamonaviy uyg‘onish ruhidagi g‘oyalar ham aks etgan.`,
    audio: { bio: null, hayot: null, asar: null }
  },

  // 10. UBAYDULLAXO'JA
  {
    id: "ubaydulla", name: "Ubaydullaxo'ja Asadullaxo'jayev", years: "1878 – 1937", initials: "U",
    bio: `Ubaydullaxo‘ja Asadullaxo‘jayev (Ubaydulla Xo‘jayev) 1878-yilda Toshkentning Shayxontohur dahasida tug‘ilgan. U o‘zbek xalqining ozodligi va istiqloli uchun kurashgan ilk huquqshunoslardan biri, yirik davlat va jamoat arbobidir.

Dastlab Toshkentdagi rus-tuzem maktabida, so‘ngra 1908–1912-yillarda Saratov universitetining yuridik fakultetida tahsil olgan. U Turkiston ziyolilari orasida birinchilardan bo‘lib oliy ma’lumotli huquqshunos diplomini qo‘lga kiritgan mutaxassis hisoblanadi. O‘qishni tamomlagach, Toshkentda advokatlik faoliyatini boshlagan va xalqning haq-huquqlarini himoya qilish bilan shug‘ullangan.

Ubaydullaxo‘ja jadidchilik harakatining faol a’zosi sifatida matbuot va siyosat maydonida muhim o‘rin tutgan. 1914-yilda "Sadoi Turkiston" gazetasini tashkil etib, unga muharrirlik qildi. 1917-yilda Turkiston muxtoriyati (Qo‘qon muxtoriyati) tashkil etilganda, uning Harbiy vaziri etib tayinlandi. U milliy qo‘shin tuzish va Turkistonning mustaqilligini mustahkamlash yo‘lida qizg‘in faoliyat yuritdi.

Muxtoriyat sho‘ro hukumati tomonidan qonga botirilgach, Ubaydullaxo‘ja turli yillar davomida ta’qib qilindi. Shunga qaramay, u ma’lum muddat adliya va qishloq xo‘jaligi sohalarida mas’ul lavozimlarda ishladi. Biroq 1930-yillarda sovet qatag‘oniga duch keldi va bir necha bor qamoqqa olindi. Ubaydullaxo‘ja Asadullaxo‘jayev 1937-yilda "Aksilinqilobiy faoliyat"da ayblanib, qatl etildi. Uning nomi va jasorati o‘zbek milliy davlatchiligi tarixida munosib o‘rin egallaydi.`,
    hayot: `Ubaydullaxo‘ja Asadullaxo‘jayevning hayoti professional huquqshunoslik, siyosiy kurash va millat fidoyiligi bilan ajralib turadi. Uning hayot yo‘lini bir necha muhim davrlarga bo‘lish mumkin:

Ilm sari intilish: Toshkentda o‘z davrining zamonaviy ta’limini olgan Ubaydullaxo‘ja Rossiyaning Saratov shahriga borib, huquqshunoslik yo‘nalishida o‘qiydi. Bu uzoq safar va o‘qish uning dunyoqarashini o‘zgartirib, Turkistonda huquqiy davlat qurish g‘oyasini shakllantiradi. U Saratovda o‘qib yurgan kezlarida o‘sha davrning ilg‘or demokratik harakatlari bilan yaqindan tanishadi.

Advokatlik va milliy uyg‘onish: Toshkentga qaytgach, u professional advokat sifatida ish boshlaydi. Uning idorasi shunchaki ish joyi emas, balki zulm ko‘rgan xalqning dardiga darmon bo‘ladigan, huquqiy maslahatlar beriladigan markazga aylanadi. Ubaydullaxo‘ja chor ma’murlari tomonidan asossiz ayblangan ko‘plab yurtdoshlarini sudlarda mardona himoya qilgan.

Siyosiy va tahririyat faoliyati: 1914-yilda "Sadoi Turkiston" gazetasiga asos solishi uning hayotidagi eng muhim qadamlardan biri bo‘ldi. Gazeta orqali u xalqning siyosiy ongi va madaniyatini yuksaltirishga intildi. U Munavvar qori, Abdulla Avloniy kabi jadidlar bilan yelkadosh bo‘lib, "Sho‘royi Islomiya" kabi tashkilotlarda faoliyat yuritdi.

Turkiston Muxtoriyati yillari: 1917-yilning noyabrida Qo‘qonda e’lon qilingan Turkiston Muxtoriyati hukumatida u Harbiy vazir lavozimini egalladi. U o‘zbek xalqining o‘z milliy qo‘shini bo‘lishi kerakligini tushunib, qisqa vaqt ichida harbiy islohotlarni boshladi. Bu davrda u Rossiyadan ajralib chiqish emas, balki keng muxtoriyat va erkinlik tarafdori bo‘lib maydonga chiqdi.

Fojiali taqdir va qatag‘on: Muxtoriyat tugatilgach, u bir muddat Moskvada yashashga majbur bo‘ldi. Keyinchalik Turkistonga qaytib, turli xo‘jalik ishlarida band bo‘lsa-da, sovet xavfsizlik organlarining doimiy kuzatuvi ostida qoldi. 1929-yildan boshlab ta’qiblar kuchaydi, u bir necha bor hibsga olindi va surgun qilindi. Oxir-oqibat, 1937-yilda "xalq dushmani" sifatida ayblanib, qatag‘on qurboni bo‘ldi.

Ubaydullaxo‘ja Asadullaxo‘jayevning butun umri o‘zbek huquqshunosligi va davlatchiligini zamonaviy asoslarga qurishga bag‘ishlandi.`,
    asar: `Ubaydullaxo‘ja Asadullaxo‘jayevning ijodiy merosi ko‘proq publitsistika, huquqshunoslik va ijtimoiy-siyosiy maqolalar bilan bog‘liq. U badiiy asarlar yaratishdan ko‘ra, xalqning siyosiy va huquqiy ongini uyg‘otishni o‘z oldiga maqsad qilib qo‘ygan.

Uning asosiy ijodiy va ilmiy faoliyat yo‘nalishlari:

"Sadoi Turkiston" gazetasi: Ubaydullaxo‘ja ushbu gazetasining asoschisi va bosh muharriri bo‘lgan. Uning deyarli barcha dolzarb maqolalari shu nashrda chop etilgan. U maqolalarida Turkistonning iqtisodiy qoloqligi, xalqning huquqsizligi va maorif tizimini isloh qilish masalalarini o‘tkir tanqid ostiga olgan.

Siyosiy publitsistika: Uning "Bizga muxtoriyat kerakmi?", "Turkiston hayoti" kabi mavzulardagi ochiq chiqishlari milliy ozodlik harakati uchun g‘oyaviy poydevor bo‘lib xizmat qildi. U o‘z maqolalarida xalqni birlashishga va o‘z taqdirini o‘zi belgilashga chorlagan.

Huquqiy qo‘llanmalar: Professional huquqshunos sifatida u xalq uchun qonunlarni sodda tilda tushuntirib beruvchi chiqishlar qilgan. Uning maqsadi Turkistonliklarning Rossiya imperiyasi qonunchiligi doirasida o‘z haq-huquqlarini qanday himoya qilishi mumkinligini o‘rgatish edi.

Tahririyat faoliyati: U nafaqat o‘z maqolalari, balki Munavvar qori, Cho‘lpon, Abdulla Qodiriy kabi yosh ijodkorlarning milliy ruhdagi asarlarini nashr etish orqali yangi o‘zbek adabiyoti va matbuotining rivojlanishiga sharoit yaratib bergan.

Ubaydullaxo‘ja Asadullaxo‘jayevning "asari" deganda, ko‘z oldimizga avvalo u asos solgan erkin matbuot va u tuzishda qatnashgan Turkiston Muxtoriyatining huquqiy hujjatlari keladi. Uning yozganlari o‘sha davrning eng qaynoq siyosiy va ijtimoiy xronikasi hisoblanadi.`,
    audio: { bio: null, hayot: null, asar: null }
  },

  // 11. NAZIR TO'RAQULOV
  {
    id: "nazir", name: "Nazir To'raqulov", years: "1892 – 1937", initials: "N",
    bio: `Nazir To‘raqulov 1892-yilda Qo‘qon shahrida (ba’zi manbalarga ko‘ra, hozirgi Janubiy Qozog‘iston viloyatida) savdogar oilasida dunyoga keldi. U o‘zbek va turkiy xalqlar tarixidagi eng yirik diplomat, davlat arbobi va tilshunos olimlardan biridir.

Uning ta’lim yo‘li Qo‘qondagi jadid maktabidan boshlanib, so‘ngra rus-tuzem maktabida davom etdi. 1914–1916-yillarda Moskva tijorat institutida iqtisod yo‘nalishida tahsil oldi. Birinchi jahon urushi davrida Rossiya armiyasining front orti ishlariga safarbar etilgan turkistonliklar orasida bo‘lib, u yerda yoshlarning huquqlari uchun kurashuvchi tashkilotlar tuzishda faollik ko‘rsatdi.

Oktyabr to‘ntarishidan so‘ng Nazir To‘raqulov Turkiston Muxtoriyatining rahbarlaridan biri, maorif komissari va Markaziy Ijroiya Qo‘mitasi raisi kabi yuksak lavozimlarda ishladi. 1928–1932-yillarda esa u SSSRning Saudiya Arabistonidagi muxtor elchisi etib tayinlandi. Bu bilan u diplomatik martabaga ega bo‘lgan ilk o‘zbek mutaxassisi sifatida tarixga kirdi. U yerda podshoh Abdulaziz ibn Saud bilan yaqin munosabat o‘rnatib, ikki davlat o‘rtasidagi aloqalarni mustahkamladi.

Nazir To‘raqulov nafaqat siyosatchi, balki yirik tilshunos ham edi. U turkiy tillar uchun lotin alifbosini joriy etish (Yanalif) harakatining yetakchilaridan biri bo‘lgan. Biroq, 1937-yilda sovet qatag‘onining navbatdagi qurboniga aylandi. "Panturkizm" va "josuslik"da ayblanib, Moskvada qatl etildi. Faqat 1958-yilga kelibgina uning nomi rasman oqlangan.`,
    hayot: `Nazir To‘raqulovning hayoti oddiy savdogar farzandidan xalqaro miqyosdagi diplomat darajasigacha ko‘tarilgan, ziddiyatli va sharafli yo‘lni o‘z ichiga oladi. Uning hayotini quyidagi asosiy bosqichlarga ajratish mumkin:

Ilm-fan va ijtimoiy faollikning boshlanishi: Qo‘qon va Moskvadagi ta’lim yillarida u iqtisodiyot va huquqni chuqur o‘rgandi. Birinchi jahon urushi yillarida front ortida ishlayotgan turkistonlik mardikorlar hayotini ko‘rib, ularning huquqlarini himoya qilish uchun "Erkinlik" tashkilotini tuzdi. Bu uning siyosiy maydonga kirib kelishidagi ilk qadami edi.

Davlat boshqaruvidagi faoliyat: 1920-yillarning boshida Nazir To‘raqulov Turkiston Respublikasining rahbarlaridan biri sifatida faoliyat yuritdi. U Markaziy Ijroiya Qo‘mitasi raisi va maorif komissari lavozimlarida ishlab, Turkistonda savodsizlikni tugatish, maktablar tarmog‘ini kengaytirish va milliy kadrlar tayyorlashga katta hissa qo‘shdi.

Diplomatik missiya va Saudiya Arabistoni: 1928-yilda uning hayotida eng yorqin sahifa ochildi — u SSSRning Saudiya Arabistonidagi elchisi (muxtor vakili) etib tayinlandi. U podshoh Abdulaziz ibn Saudning hurmatini qozongan kam sonli diplomatlardan biri edi. To‘raqulov arab tilini mukammal bilishi va islom madaniyatini chuqur tushunishi tufayli Ar-Riyodda katta nufuzga ega bo‘ldi. Uning sa’y-harakatlari bilan Sovet Ittifoqi va Saudiya Arabistoni o‘rtasida savdo va diplomatik aloqalar yo‘lga qo‘yildi.

Ilmiy va tahririyat ishlari: Diplomatik faoliyatidan so‘ng Moskvada Sharq xalqlari ilmiy-tadqiqot institutida ishladi. U turkiy xalqlar tilini isloh qilish, yangi lotin alifbosiga o‘tish masalalarida bosh-qosh bo‘ldi. "Yanalif" (Yangi alifbo) qo‘mitasining faol a’zosi sifatida yuzlab ilmiy maqolalar yozdi.

Fojiali yakun: 1937-yilda Nazir To‘raqulov ham boshqa ko‘plab ziyolilar kabi qatag‘on qilindi. U "panturkizm"da, xorijiy davlatlar foydasiga josuslik qilishda ayblanib, Moskva yaqinidagi "Kommunarka" poligonida otib tashlandi.

Nazir To‘raqulov o‘zbek xalqi orasidan chiqqan ilk professional diplomat sifatida jahon siyosati tarixida o‘zining munosib o‘rnini egalladi.`,
    asar: `Nazir To‘raqulovning asarlari asosan tilshunoslik, siyosat, iqtisodiyot va publitsistika sohalariga oid bo‘lib, u badiiy ijoddan ko‘ra ko‘proq ilmiy-nazariy va ijtimoiy masalalarga e’tibor qaratgan. Uning asarlari turkiy xalqlarni zamonaviylashtirish va ma’rifatli qilish g‘oyasi bilan sug‘orilgan.

Uning asosiy ilmiy va publitsistik merosi quyidagilardan iborat:

1. Tilshunoslik va Alifbo islohotiga oid asarlari
Nazir To‘raqulov turkiy xalqlarni birlashtiradigan umumiy lotin alifbosini yaratishning asosiy tashabbuskorlaridan biri bo‘lgan.

"Yangi alifbo yo‘lida": Lotin alifbosiga o‘tishning zaruriyati va afzalliklari haqidagi ilmiy-ommabop asari.

"O‘zbek tili qoidalari haqida": O‘zbek tili grammatikasi va imlo qoidalarini tizimlashtirishga bag‘ishlangan maqolalar to‘plami.

Turkiy tillar terminologiyasi: U turli fan sohalariga oid atamalarni turkiylashtirish va bir xillashtirish bo‘yicha ko‘plab ilmiy ma’ruzalar tayyorlagan.

2. Ijtimoiy-siyosiy va Iqtisodiy asarlari
"Turkiston muxtoriyati va maorif": Turkiston o‘lkasida ta’lim tizimini qanday isloh qilish kerakligi haqidagi dasturiy maqolalari.

"Iqtisodiy siyosat asoslari": Moskva tijorat institutida olgan bilimlari asosida yozilgan, mintaqa iqtisodiyotini ko‘tarishga doir mulohazalari.

"Sharq va G‘arb": Sharq madaniyati va G‘arb texnologiyasining sintezi haqidagi falsafiy-ijtimoiy qarashlari.

3. Diplomatik va Publisistik faoliyati
"Tarjimayi hol": O‘zining hayoti va siyosiy faoliyati haqidagi qimmatli xotiralari.

Diplomatik hisobotlar va yozishmalar: Uning Saudiya Arabistonidagi elchilik davrida yozgan tahliliy eslatmalari va podshoh Abdulaziz ibn Saud bilan olib borgan yozishmalari bugungi kunda tarixiy va siyosiy ahamiyatga ega muhim hujjatlar hisoblanadi.

Matbuotdagi chiqishlari: "Inqilob", "Maorif va o‘qituvchi" kabi jurnallarda chop etilgan yuzlab maqolalari xalqning siyosiy savodxonligini oshirishga xizmat qilgan.

Nazir To‘raqulovning asarlari o‘z davrida o‘zbek tilining ilmiy salohiyatini ko‘rsatib berishda va milliy davlatchilik asoslarini huquqiy-ma’rifiy jihatdan asoslashda muhim rol o‘ynagan.`,
    audio: { bio: null, hayot: null, asar: null }
  },

  // 12. FERUZBEK
  {
    id: "feruzbek", name: "Feruzbek Qo'qandiy", years: "1840 – 1909", initials: "FK",
    bio: `Feruzbek Qo‘qandiy (haqiqiy ismi Feruzbek Olimov) — zamonaviy o‘zbek ma’rifatparvarlik harakatining vakili, adabiyotshunos, pedagog va jamoat arbobi. Uning hayoti va faoliyati asosan o‘zbek tili, adabiyoti hamda milliy qadriyatlarni targ‘ib qilishga qaratilgan.

Tarjimayi holi
Feruzbek Qo‘qandiy 1991-yil 26-oktabrda Farg‘ona viloyatining Qo‘qon shahrida tug‘ilgan. Uning bolaligi va yoshligi Qo‘qonning boy adabiy muhitida o‘tgan bo‘lib, bu uning kelajakda filologiya yo‘nalishini tanlashiga kuchli ta’sir ko‘rsatgan.

Ma’lumoti:

Qo‘qon davlat pedagogika instituti: O‘zbek tili va adabiyoti fakultetida tahsil olgan.

Magistratura: Alisher Navoiy nomidagi Toshkent davlat o‘zbek tili va adabiyoti universitetida o‘qishni davom ettirib, adabiyotshunoslik bo‘yicha ilmiy izlanishlar olib borgan.

Faoliyati va Hayoti
Feruzbek Qo‘qandiyning faoliyati asosan ijtimoiy tarmoqlar va raqamli platformalar orqali xalqning, ayniqsa yoshlarning savodxonligini oshirishga yo‘naltirilgan.

Ma’rifatparvarlik: U jadidlar an’anasini davom ettirgan holda, o‘zbek tilining boyligi va uning imlo qoidalarini xalqchil tilda tushuntirish bilan shug‘ullanadi. Uning "Feruzbek Qo‘qandiy" nomi ostidagi loyihalari minglab yoshlarni adabiyotga qiziqtira oldi.

Adabiyot targ‘iboti: Mumtoz adabiyot, xususan, Alisher Navoiy, Bobur, shuningdek, jadid adabiyoti namoyandalari (Cho‘lpon, Fitrat, Abdulla Qodiriy) merosini tahlil qilish va ularni zamonaviy talqinda yoshlarga yetkazish uning hayotiy maslagiga aylangan.

Pedagogik faoliyat: U uzoq yillar davomida abituriyentlarni oliy o‘quv yurtlariga tayyorlash va o‘zbek tili fanidan chuqurlashtirilgan darslar berish bilan shug‘ullanib kelmoqda.

Asarlari va Ijodi
Feruzbek Qo‘qandiy asosan ilmiy-ommabop maqolalar, tahliliy videolar va o‘quv qo‘llanmalar muallifidir. Uning ijodiy merosi quyidagi yo‘nalishlarda namoyon bo‘ladi:

"Qirq hadis va qirq hikmat": Ma’naviy-axloqiy mavzudagi sharhlari va tushuntirishlari.

Imlo va uslubiyat bo‘yicha qo‘llanmalar: O‘zbek tili grammatikasi va to‘g‘ri yozish qoidalariga oid metodik materiallar.

Tahliliy maqolalar: O‘zbek adabiyoti tarixidagi noaniq sahifalar va ijodkorlar taqdiriga bag‘ishlangan maqolalari turli nashrlarda va elektron platformalarda chop etilgan.

Audiovizual asarlar: Uning yuzlab video-darslari va badiiy tahlillari bugungi kunda o‘zbek segmentidagi eng sifatli ta’limiy kontentlardan biri hisoblanadi.

Feruzbek Qo‘qandiy bugungi kunda ham Qo‘qon va Toshkent shaharlarida o‘zining ilmiy-ma’rifiy faoliyatini faol davom ettirib, o‘zbek tili va adabiyotini xalqaro miqyosda targ‘ib qilish ustida ishlamoqda.`,
    hayot: `Feruzbek Qo‘qandiyning (Feruzbek Olimov) hayoti zamonaviy o‘zbek filologiyasi, milliy ma’rifatparvarlik va raqamli texnologiyalar uyg‘unligidan iborat. U o‘zining qisqa, ammo mazmunli faoliyati davomida o‘zbek tili va adabiyotini yoshlar orasida ommalashtirishning yangi modelini yaratdi.

Uning hayot yo‘lidagi asosiy jihatlar:

Ilmga poydevor: Qo‘qon shahrining adabiy muhitida voyaga yetgan Feruzbek yoshligidanoq kitobxonlik va so‘z san’atiga mehr qo‘ygan. Bu qiziqish uni Qo‘qon davlat pedagogika institutiga yetakladi. O‘qish davomida u nafaqat nazariy bilimlarni egalladi, balki mumtoz adabiyotimizning nodir namunalarini tahlil qilish mahoratini ham shakllantirdi.

Toshkentdagi ilmiy muhit: Magistratura bosqichida Alisher Navoiy nomidagi Toshkent davlat o‘zbek tili va adabiyoti universitetida tahsil olishi uning dunyoqarashini kengaytirdi. Bu yerda u taniqli adabiyotshunos olimlar bilan muloqotda bo‘lib, jadidchilik harakati va matnshunoslik sohalarida o‘z bilimlarini mustahkamlagan.

Raqamli ma’rifatparvarlik: Feruzbek Qo‘qandiy hayotining eng muhim burilish nuqtasi — an’anaviy darsliklarni zamonaviy media bilan bog‘lagani bo‘ldi. U o‘zbek tili va adabiyoti shunchaki "quruq qoidalar" emas, balki jonli va jozibador fan ekanini isbotlash uchun ijtimoiy tarmoqlardan unumli foydalana boshladi. Uning hayoti kundalik darslar, tahliliy videokontentlar yaratish va xalq bilan muloqotga bag‘ishlangan.

Pedagogik mahorat: U uzoq yillar davomida o‘quv markazlarida faoliyat yuritib, minglab yoshlarning oliy ta’lim muassasalariga kirishiga va eng muhimi, o‘z ona tilini sevishiga sababchi bo‘ldi. Uning dars berish uslubi o‘ziga xos samimiyligi va soddaligi bilan ajralib turadi.

Feruzbek Qo‘qandiy bugungi kunda ham o‘z hayotini o‘zbek tili nufuzini oshirishga, xususan, lotin alifbosidagi imlo qoidalarini to‘g‘ri qo‘llash va mumtoz asarlarimizdagi murakkab so‘zlar sharhini xalqqa yetkazishga bag‘ishlab kelmoqda. Uning hayoti zamonaviy ziyolining jamiyatdagi o‘rni qanday bo‘lishi kerakligiga yorqin namunadir.`,
    asar: `Feruzbek Qo‘qandiyning asarlari va ijodiy merosi an’anaviy kitob shaklidan ko‘ra ko‘proq ilmiy-metodik, ommabop-tahliliy va raqamli kontent ko‘rinishida namoyon bo‘ladi. U o‘z faoliyatini zamonaviy ma’rifatparvarlik deb hisoblaydi va asarlari orqali o‘zbek tili hamda adabiyotini yoshlarga sodda tilda yetkazishni maqsad qilgan.

Uning ijodiy yo‘nalishlarini quyidagi guruhlarga ajratish mumkin:

1. Metodik va o‘quv qo‘llanmalari
Pedagog sifatidagi tajribasiga tayanib, u o‘zbek tili va adabiyotini o‘rganuvchilar uchun bir qator yordamchi materiallar yaratgan:

"O‘zbek tili imlo qoidalari" (to‘plam): Ijtimoiy tarmoqlar va darslarida keng foydalaniladigan, o‘zbek tilidagi eng ko‘p xato qilinadigan so‘zlar va ularning to‘g‘ri yozilishiga doir metodik tavsiyalar.

Abituriyentlar uchun maxsus testlar va tahlillar: O‘zbek tili va adabiyoti fanidan test bazalari va ularning mantiqiy yechimlari tushuntirilgan qo‘llanmalar.

2. Adabiy-tahliliy maqolalari
Feruzbek Qo‘qandiy mumtoz va jadid adabiyotini chuqur tadqiq etadi. Uning maqolalari asosan quyidagi mavzularni qamrab oladi:

Navoiyshunoslik: Alisher Navoiy g‘azallarining sharhi va ulardagi irfoniy ma’nolarni zamonaviy tilga ko‘chirish.

Jadidlar merosi: Abdulla Qodiriy, Cho‘lpon va Fitrat asarlarining badiiy tahlili hamda ularning hayotiga doir kam o‘rganilgan faktlar yoritilgan publitsistik chiqishlar.

"Qirq hadis va qirq hikmat": Ma’naviy-ma’rifiy mavzularda yozilgan sharhlar va inson kamolotiga oid mulohazalar to‘plami.

3. Raqamli asarlar (Mediakontent)
Zamonaviy davrda intellektual kontentni ham "asar" sifatida e’tirof etish mumkin. Feruzbek Qo‘qandiyning bu boradagi ijodi eng salmoqli hisoblanadi:

"Adabiyot darslari" turkumi: O‘rta va oliy ta’lim darsliklaridagi asarlarni vizual va audio shaklda tahlil qilib beruvchi turkum videodarslar.

Imlo va Nutq madaniyati bo‘yicha videobloglar: O‘zbek tilining nufuzini oshirish va xalq orasida to‘g‘ri gapirish hamda yozish madaniyatini shakllantirishga qaratilgan qisqa va lo‘nda videoloyiha.

4. Badiiy ijodi
Garchi u ko‘proq munaqqid va pedagog sifatida tanilgan bo‘lsa-da, uning ijodida:

Nasriy va she’riy mashqlar: Turli adabiy kechalar va shaxsiy sahifalarida e’lon qilib boriladigan, milliy ruh va sog‘inch mavzusidagi kichik lirik asarlari mavjud.

Feruzbek Qo‘qandiyning asosiy xizmati — u o‘z asarlari bilan o‘zbek tili va adabiyotini "muzeydagi eksponat" emas, balki "yashayotgan va nafas olayotgan xazina" sifatida yoshlar qalbiga yetkazib bera olganidadir.`,
    audio: { bio: null, hayot: null, asar: null }
  },
];

function showPage(pageId) {

  const target = document.getElementById(pageId);
  target.classList.add('active');
  target.style.display = 'block';
  window.scrollTo(0, 0);

  const backBtn   = document.getElementById('back-btn');
  const headerSub = document.getElementById('header-sub');
  if (pageId === 'jadidlar-page') {
    backBtn.style.display = 'none';
    headerSub.textContent = 'Jadidni tanlang';
  } else {
    backBtn.style.display = 'flex';
    headerSub.textContent = selectedJadid ? selectedJadid.name : '';
  }
}

function goBack() {
  stopAudio();
  navHistory.pop();
  showPage(navHistory[navHistory.length - 1]);
}

// ================================================================
// RO'YXAT
// ================================================================
function renderJadidlar(list) {
  const container = document.getElementById('jadidlar-list');
  container.innerHTML = '';
  list.forEach(jadid => {
    const card = document.createElement('div');
    card.className = 'jadid-card';
    card.innerHTML = `
      <div class="jadid-avatar">${jadid.initials}</div>
      <div class="jadid-info">
        <h3>${jadid.name}</h3>
        <p>${jadid.years}</p>
      </div>
      <span class="arrow">›</span>`;
    card.onclick = () => selectJadid(jadid);
    container.appendChild(card);
  });
}

function filterJadidlar(q) {
  renderJadidlar(jadidlar.filter(j => j.name.toLowerCase().includes(q.toLowerCase())));
}

// ================================================================
// JADID TANLASH
// ================================================================
function selectJadid(jadid) {
  selectedJadid = jadid;
  document.getElementById('hero-avatar').textContent = jadid.initials;
  document.getElementById('hero-name').textContent   = jadid.name;
  document.getElementById('hero-years').textContent  = jadid.years;
  navHistory.push('jadid-menu-page');
  showPage('jadid-menu-page');
}

// ================================================================
// KONTENT
// ================================================================
function showContent(type) {
  currentType = type;
  stopAudio();

  const titles = {
    bio:   '📖 ' + selectedJadid.name + ' — Avtobiografiya',
    hayot: '🌟 ' + selectedJadid.name + ' — Hayoti va ijodi',
    asar:  '📝 ' + selectedJadid.name + ' — Asarlari'
  };

  document.getElementById('content-title').textContent = titles[type];
  document.getElementById('content-text').textContent  = selectedJadid[type] || '(matn kiritilmagan)';

  const audioUrl = selectedJadid.audio && selectedJadid.audio[type];
  const player   = document.getElementById('audio-player');
  const noAudio  = document.getElementById('no-audio-msg');

  if (audioUrl) {
    player.src = audioUrl;
    player.load();
    player.style.display = 'block';
    noAudio.style.display = 'none';
  } else {
    player.src = '';
    player.style.display = 'none';
    noAudio.style.display = 'block';
  }

  navHistory.push('content-page');
  showPage('content-page');
}

function stopAudio() {
  const player = document.getElementById('audio-player');
  if (player) { player.pause(); player.currentTime = 0; }
}

// ================================================================
// TELEGRAM
// ================================================================
if (window.Telegram && window.Telegram.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}

document.addEventListener('DOMContentLoaded', function() {
  const fp = document.getElementById('jadidlar-page');
  fp.style.display = 'block';
  fp.classList.add('active');
  renderJadidlar(jadidlar);
});
</script>
</body>
</html>
