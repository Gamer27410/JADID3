Nashrlar: "Shuhrat" (1907), "Osiyo" (1908), "Turan" (1917) kabi gazetalarni tashkil qilgan va ularda muharrirlik qilgan.

6. Umrining Oxiri va Merosi
Abdulla Avloniy hayotining so‚Äònggi yillarida O‚Äòrta Osiyo davlat universitetida (hozirgi O‚ÄòzMU) dars bergan, professor unvoniga ega bo‚Äòlgan. U 1934-yil 25-avgustda Toshkentda vafot etgan.

Bugungi kunda uning nomi Toshkentdagi markaziy ko‚Äòchalardan biriga, xalq ta‚Äôlimi xodimlarini qayta tayyorlash institutiga berilgan. Uning asarlari maktab darsliklarining ajralmas qismiga aylangan.`,
    hayot: `Abdulla Avloniy ‚Äî o‚Äòzbek ma‚Äôrifatparvarlik adabiyotining yirik vakili, iste‚Äôdodli shoir, dramaturg, jurnalist va zamonaviy pedagogika asoschilaridan biri. Uning hayoti va ijodi o‚Äòzbek xalqining ma‚Äônaviy uyg‚Äòonish davri bilan chambarchas bog‚Äòliq.
‚Äã1. Hayot yo‚Äòli
‚ÄãAbdulla Avloniy 1878-yil 12-iyulda Toshkentning Mergancha mahallasida tug‚Äòilgan. Uning bolaligi va yoshligi oson kechmagan:
‚ÄãTa‚Äôlimi: Dastlab eski maktabda, so‚Äòngra madrasada o‚Äòqidi. Biroq u faqat diniy bilimlar bilan cheklanib qolmay, mustaqil ravishda rus tili va dunyoviy fanlarni o‚Äòrgandi.
‚ÄãKasbi: O‚Äòz xarajatlarini qoplash uchun yoshligidan binokorlik va ganchkorlik bilan shug‚Äòullangan, xalq orasida u "Imoratchi usta" sifatida ham tanilgan.
‚ÄãJamoat ishlari: 1917-yilgi inqilobdan keyin u turli davlat lavozimlarida ishladi, Afg‚Äòonistonda diplomatik missiyalarda qatnashdi va umrining oxirigacha O‚Äòrta Osiyo davlat universitetida (hozirgi O‚ÄòzMU) dars berdi.
‚Äã2. Pedagogik faoliyati: "Yangi usul" maktablari
‚ÄãAvloniy millatni uyg‚Äòotishning yagona yo‚Äòli ‚Äî ta‚Äôlimda deb bildi. 1904-yilda u Toshkentning Mirobod mahallasida jadid maktabini ochdi.
‚ÄãDarsliklar yaratishi: U yangi maktablar uchun zamonaviy darsliklar yozdi. Ularning ichida eng mashhurlari:

‚Äã‚ÄúIkkinchi muallim‚Äù
‚Äã‚ÄúTurkiy Guliston yoxud axloq‚Äù (Bu asar hozir ham axloqshunoslikning eng sara namunasi hisoblanadi).
‚ÄãXayriya: U kambag‚Äòal bolalarni o‚Äòqitish uchun "Jamiyati xayriya" tashkilotini tuzishda jonbozlik ko‚Äòrsatgan.
‚Äã3. Adabiy va badiiy ijodi
‚ÄãAvloniy ijodi rang-barang: u ham shoir, ham dramaturg, ham publitsist edi.
‚ÄãShe‚Äôriyati
‚ÄãU "Hijron" taxallusi bilan she‚Äôrlar yozgan. Uning she‚Äôrlarida millat qayg‚Äòusi, ilmga chorlov va hurlik g‚Äòoyalari ustuvor:

// ================================================================
// HOLAT
// ================================================================
let selectedJadid = null;
let currentType   = null;
let navHistory    = ['jadidlar-page'];

// ================================================================
// SAHIFALAR
// ================================================================
function showPage(pageId) {
  ['jadidlar-page','jadid-menu-page','content-page'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('active');
    el.style.display = 'none';
  });
  const target = document.getElementById(pageId);
  target.classList.add('active');
  target.style.display = 'block';
  window.scrollTo(0, 0);

  const backBtn   = document.getElementById('back-btn');
  const headerSub = document.getElementById('header-sub');
  if (pageId === 'jadidlar-page') {
    backBtn.style.display = 'none';
    headerSub.textContent = 'Jadidni tanlang';
  } else {
    backBtn.style.display = 'flex';
    headerSub.textContent = selectedJadid ? selectedJadid.name : '';
  }
}

function goBack() {
  stopAudio();
  navHistory.pop();
  showPage(navHistory[navHistory.length - 1]);
}

// ================================================================
// RO'YXAT
// ================================================================
function renderJadidlar(list) {
  const container = document.getElementById('jadidlar-list');
  container.innerHTML = '';
  list.forEach(jadid => {
    const card = document.createElement('div');
    card.className = 'jadid-card';
    card.innerHTML = `
      <div class="jadid-avatar">${jadid.initials}</div>
      <div class="jadid-info">
        <h3>${jadid.name}</h3>
        <p>${jadid.years}</p>
      </div>
      <span class="arrow">‚Ä∫</span>`;
    card.onclick = () => selectJadid(jadid);
    container.appendChild(card);
  });
}

function filterJadidlar(q) {
  renderJadidlar(jadidlar.filter(j => j.name.toLowerCase().includes(q.toLowerCase())));
}

// ================================================================
// JADID TANLASH
// ================================================================
function selectJadid(jadid) {
  selectedJadid = jadid;
  document.getElementById('hero-avatar').textContent = jadid.initials;
  document.getElementById('hero-name').textContent   = jadid.name;
  document.getElementById('hero-years').textContent  = jadid.years;
  navHistory.push('jadid-menu-page');
  showPage('jadid-menu-page');
}

// ================================================================
// KONTENT
// ================================================================
function showContent(type) {
  currentType = type;
  stopAudio();

  const titles = {
    bio:   'üìñ ' + selectedJadid.name + ' ‚Äî Avtobiografiya',
    hayot: 'üåü ' + selectedJadid.name + ' ‚Äî Hayoti va ijodi',
    asar:  'üìù ' + selectedJadid.name + ' ‚Äî Asarlari'
  };

  document.getElementById('content-title').textContent = titles[type];
  document.getElementById('content-text').textContent  = selectedJadid[type] || '(matn kiritilmagan)';

  const audioUrl = selectedJadid.audio && selectedJadid.audio[type];
  const player   = document.getElementById('audio-player');
  const noAudio  = document.getElementById('no-audio-msg');

  if (audioUrl) {
    player.src = audioUrl;
    player.load();
    player.style.display = 'block';
    noAudio.style.display = 'none';
  } else {
    player.src = '';
    player.style.display = 'none';
    noAudio.style.display = 'block';
  }

  navHistory.push('content-page');
  showPage('content-page');
}

function stopAudio() {
  const player = document.getElementById('audio-player');
  if (player) { player.pause(); player.currentTime = 0; }
}

// ================================================================
// TELEGRAM
// ================================================================
if (window.Telegram && window.Telegram.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}

document.addEventListener('DOMContentLoaded', function() {
  const fp = document.getElementById('jadidlar-page');
  fp.style.display = 'block';
  fp.classList.add('active');
  renderJadidlar(jadidlar);
});
</script>
