‚ÄčKasbi: O‚Äėz xarajatlarini qoplash uchun yoshligidan binokorlik va ganchkorlik bilan shug‚Äėullangan, xalq orasida u "Imoratchi usta" sifatida ham tanilgan.

‚Äč2. Pedagogik faoliyati: "Yangi usul" maktablari

‚ÄčXayriya: U kambag‚Äėal bolalarni o‚Äėqitish uchun "Jamiyati xayriya" tashkilotini tuzishda jonbozlik ko‚Äėrsatgan.
‚Äč3. Adabiy va badiiy ijodi
‚ÄčAvloniy ijodi rang-barang: u ham shoir, ham dramaturg, ham publitsist edi.
‚ÄčShe‚Äôriyati

    hayot: `Ubaydullaxo‚Äėja Asadullaxo‚Äėjayevning hayoti professional huquqshunoslik, siyosiy kurash va millat fidoyiligi bilan ajralib turadi. Uning hayot yo‚Äėlini bir necha muhim davrlarga bo‚Äėlish mumkin:

    asar: `Ubaydullaxo‚Äėja Asadullaxo‚Äėjayevning ijodiy merosi ko‚Äėproq publitsistika, huquqshunoslik va ijtimoiy-siyosiy maqolalar bilan bog‚Äėliq. U badiiy asarlar yaratishdan ko‚Äėra, xalqning siyosiy va huquqiy ongini uyg‚Äėotishni o‚Äėz oldiga maqsad qilib qo‚Äėygan.

    hayot: `Nazir To‚Äėraqulovning hayoti oddiy savdogar farzandidan xalqaro miqyosdagi diplomat darajasigacha ko‚Äėtarilgan, ziddiyatli va sharafli yo‚Äėlni o‚Äėz ichiga oladi. Uning hayotini quyidagi asosiy bosqichlarga ajratish mumkin:

// ================================================================
// HOLAT
// ================================================================
let selectedJadid = null;
let currentType   = null;
let navHistory    = ['jadidlar-page'];

// ================================================================
// SAHIFALAR
// ================================================================
function showPage(pageId) {
  ['jadidlar-page','jadid-menu-page','content-page','pdf-page'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('active');
    el.style.display = 'none';
  });
  const target = document.getElementById(pageId);
  target.classList.add('active');
  target.style.display = 'block';
  window.scrollTo(0, 0);

  const backBtn   = document.getElementById('back-btn');
  const headerSub = document.getElementById('header-sub');
  if (pageId === 'jadidlar-page') {
    backBtn.style.display = 'none';
    headerSub.textContent = 'Jadidni tanlang';
  } else {
    backBtn.style.display = 'flex';
    headerSub.textContent = selectedJadid ? selectedJadid.name : '';
  }
}

function goBack() {
  stopAudio();
  navHistory.pop();
  showPage(navHistory[navHistory.length - 1]);
}

// ================================================================
// RO'YXAT
// ================================================================
function renderJadidlar(list) {
  const container = document.getElementById('jadidlar-list');
  container.innerHTML = '';
  list.forEach(jadid => {
    const card = document.createElement('div');
    card.className = 'jadid-card';
    card.innerHTML = `
      <div class="jadid-avatar">${jadid.initials}</div>
      <div class="jadid-info">
        <h3>${jadid.name}</h3>
        <p>${jadid.years}</p>
      </div>
      <span class="arrow">‚Äļ</span>`;
    card.onclick = () => selectJadid(jadid);
    container.appendChild(card);
  });
}

function filterJadidlar(q) {
  renderJadidlar(jadidlar.filter(j => j.name.toLowerCase().includes(q.toLowerCase())));
}

// ================================================================
// JADID TANLASH
// ================================================================
function selectJadid(jadid) {
  selectedJadid = jadid;
  document.getElementById('hero-avatar').textContent = jadid.initials;
  document.getElementById('hero-name').textContent   = jadid.name;
  document.getElementById('hero-years').textContent  = jadid.years;
  navHistory.push('jadid-menu-page');
  showPage('jadid-menu-page');
}

// ================================================================
// KONTENT
// ================================================================
function showContent(type) {
  currentType = type;
  stopAudio();

  const titles = {
    bio:   'ūüďĖ ' + selectedJadid.name + ' ‚ÄĒ Avtobiografiya',
    hayot: 'ūüĆü ' + selectedJadid.name + ' ‚ÄĒ Hayoti va ijodi',
    asar:  'ūüďĚ ' + selectedJadid.name + ' ‚ÄĒ Asarlari'
  };

  document.getElementById('content-title').textContent = titles[type];
  document.getElementById('content-text').textContent  = selectedJadid[type] || '(matn kiritilmagan)';

  const audioUrl = selectedJadid.audio && selectedJadid.audio[type];
  const player   = document.getElementById('audio-player');
  const noAudio  = document.getElementById('no-audio-msg');

  if (audioUrl) {
    player.src = audioUrl;
    player.load();
    player.style.display = 'block';
    noAudio.style.display = 'none';
  } else {
    player.src = '';
    player.style.display = 'none';
    noAudio.style.display = 'block';
  }

  navHistory.push('content-page');
  showPage('content-page');
}

function stopAudio() {
  const player = document.getElementById('audio-player');
  if (player) { player.pause(); player.currentTime = 0; }
}

// ================================================================
// PDF SAHIFASI
// ================================================================
function showPdfPage() {
  stopAudio();
  document.getElementById('pdf-hero-avatar').textContent = selectedJadid.initials;
  document.getElementById('pdf-hero-name').textContent   = selectedJadid.name;

  const pdfUrl = selectedJadid.pdf;
  const avail  = document.getElementById('pdf-available');
  const unavail = document.getElementById('pdf-unavailable');

  if (pdfUrl) {
    avail.style.display   = 'block';
    unavail.style.display = 'none';
    const fname = pdfUrl.split('/').pop();
    document.getElementById('pdf-filename-label').textContent = 'ūüďé ' + fname;
    document.getElementById('pdf-modal-title').textContent = 'ūüďĄ ' + selectedJadid.name;
  } else {
    avail.style.display   = 'none';
    unavail.style.display = 'block';
  }

  navHistory.push('pdf-page');
  showPage('pdf-page');
}

function openPdfViewer() {
  if (!selectedJadid || !selectedJadid.pdf) return;
  document.getElementById('pdf-frame').src = selectedJadid.pdf;
  document.getElementById('pdf-modal').classList.add('open');
}

function closePdfViewer() {
  document.getElementById('pdf-modal').classList.remove('open');
  document.getElementById('pdf-frame').src = '';
}

function downloadPdf() {
  if (!selectedJadid || !selectedJadid.pdf) return;
  const a = document.createElement('a');
  a.href = selectedJadid.pdf;
  a.download = selectedJadid.id + '_malumot.pdf';
  a.target = '_blank';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// ================================================================
// TELEGRAM
// ================================================================
if (window.Telegram && window.Telegram.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}

document.addEventListener('DOMContentLoaded', function() {
  const fp = document.getElementById('jadidlar-page');
  fp.style.display = 'block';
  fp.classList.add('active');
  renderJadidlar(jadidlar);
});
</script>
